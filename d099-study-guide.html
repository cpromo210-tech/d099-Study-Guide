requirement that screens out women at higher rates without being job-relevant.\n\nBoth are illegal under Title VII and other antidiscrimination statutes."},{"q":"Q19: Describe the advantages and disadvantages of hiring an internal candidate.","a":"Advantages:\n• Known performance and culture fit\n• Faster ramp-up\n• Lower hiring cost\n• Boosts morale and retention (advancement signal)\n• Reduces risk of bad hire\n\nDisadvantages:\n• Smaller talent pool\n• May lack fresh ideas\n• Creates a vacancy elsewhere\n• Possible internal rivalries among other candidates\n• Skill gaps may exist for new role"},{"q":"Q20: Compare and contrast unstructured and structured format of interviews.","a":"Unstructured Interview — Open-ended, conversational; questions vary by candidate.\n• Pros: Flexible, builds rapport, follows interesting leads.\n• Cons: Inconsistent, low reliability, prone to bias, hard to compare candidates.\n\nStructured Interview — Same questions in same order for all candidates; scored consistently.\n• Pros: Higher reliability and validity, fairer, easier to compare, defensible legally.\n• Cons: Less flexibility, can feel rigid.\n\nPA EXAMPLE: Using the same interview question across years to gauge cultural fit relies on RELIABILITY (consistent measure across candidates over time)."},{"q":"Q21: Describe the eight types of interviews.","a":"1. Structured — Same questions/order for everyone.\n2. Unstructured — Conversational, open-ended.\n3. Behavioral — Past behavior in real situations (\"Tell me about a time...\").\n4. Situational — Hypothetical scenarios (\"What would you do if...\").\n5. Panel — Multiple interviewers at once.\n6. Group — Multiple candidates interviewed together.\n7. Stress — Designed to test reactions under pressure.\n8. Phone/Video — Remote screening or interview."},{"q":"Q22: Difference between situational and behavioral interview questions, with examples.","a":"Situational Questions — Hypothetical future scenarios.\nExample: \"How would you construct a sales compensation package?\"\nPA EXAMPLE: \"How would you construct a sales compensation package?\" = SITUATIONAL question.\n\nBehavioral Questions — Based on actual past behavior.\nExample: \"Tell me about a time you resolved a conflict with a customer.\"\n\nKey idea:\n• Behavioral = \"Tell me about a time...\"\n• Situational = \"What would you do if...\""},{"q":"Q23: List the types of interview questions that are considered illegal.","a":"Generally illegal questions touch on protected characteristics:\n• Age (unless verifying minimum legal age)\n• Race, color, national origin, ethnicity\n• Religion or religious practices\n• Sex, gender identity, sexual orientation\n• Marital status, family/childcare plans\n• Pregnancy or plans to have children\n• Disability, medical history, mental health\n• Genetic information\n• Citizenship (can ask if legally authorized to work)\n• Arrest record (some convictions OK to ask in many jurisdictions)"},{"q":"Q24: List the nine-step interview process.","a":"1. Plan and prepare (review resume, prepare questions).\n2. Greet and build rapport.\n3. Open with intro about the company/role.\n4. Ask structured questions (behavioral + situational).\n5. Allow candidate to ask questions.\n6. Describe next steps and timeline.\n7. Close professionally.\n8. Document and score the interview.\n9. Compare candidates against rubric and decide."},{"q":"Q25: List and describe the seven tips for a successful interview process.","a":"1. Prepare thoroughly — Know the role and review resumes.\n2. Use structured questions — Compare candidates fairly.\n3. Mix behavioral and situational questions — Past behavior + hypothetical reasoning.\n4. Avoid illegal questions — Stick to job-relevant topics.\n5. Take notes and use a scoring rubric — Reduces bias.\n6. Conduct multiple rounds with multiple interviewers — Diverse perspectives.\n7. Provide a positive candidate experience — Even rejected candidates can become customers/referrers."},{"q":"Q26: Different types of tests that may be used. What do Myers-Briggs and Big Five assess?","a":"Selection tests include:\n• Personality Tests\n• Cognitive/Aptitude Tests\n• Skills Assessments\n• Integrity/Honesty Tests\n• Situational Judgment Tests\n• Drug Tests\n• Physical Ability Tests\n\nMyers-Briggs Type Indicator (MBTI) — Categorizes personality into 16 types based on 4 dimensions:\n• Extraversion vs Introversion\n• Sensing vs Intuition\n• Thinking vs Feeling\n• Judging vs Perceiving\n\nBig Five Personality Test — Measures the five core personality dimensions (OCEAN):\n• Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism.\n\nPA NOTE: Testing should be CONSISTENTLY APPLIED TO ALL CANDIDATES (fair and legal)."},{"q":"Q27: Identify key characteristics of three major types of validity.","a":"Validity — Extent to which a test/tool truly measures what it intends to measure.\n\n1. Content Validity — Test items represent the actual content/skills required for the job (a typing test for a typist).\n\n2. Construct Validity — Test measures the theoretical construct it claims to measure (an integrity test that actually measures honesty).\n\n3. Criterion-Related Validity — Test scores correlate with job performance.\n   • Concurrent: Compared to current employees' performance.\n   • Predictive: Compared to future job performance of new hires.\n\nReliability (PA-relevant) — Consistency of measurement over time/across raters."},{"q":"Q28: Identify key characteristics of selection methods.","a":"a. Clinical Selection Process — Subjective. The hiring manager reviews all candidate info and uses judgment to choose.\n\nb. Statistical Method — Objective. Uses scoring formulas/regression to combine assessments and predict success.\n\nc. Compensatory Model — Strength in one area can compensate for weakness in another. High score on one test offsets low score on another.\n\nd. Multiple Cutoff Model — Candidate must meet a MINIMUM score on EACH selection step. Failure on any one step disqualifies.\n\ne. Multiple Hurdle Model — Sequential cutoffs; candidates must pass each stage before moving to the next. Fail any stage = elimination from the process."}]},{"title":"Module 8: Sales Training","cards":[{"q":"Q1: Explain sales effectiveness and its importance for a company's success.","a":"Sales Effectiveness — Ability of a sales force to close deals on the best terms for the company. Occurs when the sales function operates so salespeople can \"win\" at every stage of the selling process.\n\nImportance:\n• Drives revenue and profit\n• Improves margins (sell on value vs. price)\n• Builds customer satisfaction and retention\n• Reduces wasted sales effort\n• Aligns sales with strategy\n• Strengthens competitive position"},{"q":"Q2: List and describe the nine benefits of training for employees and organizations.","a":"1. Improved Productivity — Better skills = more output per rep.\n   PA EXAMPLE: Sales training that helps reps better communicate value → IMPROVED PRODUCTIVITY (the direct benefit).\n\n2. Improved Employee Morale — Investment signals the company cares.\n\n3. Lower Employee Turnover — Trained employees feel competent and stay longer.\n\n4. Improved Customer Relationships — Skilled reps build stronger ties.\n   PA EXAMPLE: Training to maintain regular communication → IMPROVED CUSTOMER RELATIONSHIPS.\n\n5. Reduced Errors and Rework\n\n6. Better Knowledge Sharing across the team\n\n7. Easier Adaptation to Change (new tech, new products)\n\n8. Stronger Company Culture\n\n9. Competitive Advantage in the marketplace"},{"q":"Q3: What factors should sales managers consider before implementing training?","a":"Considerations:\n• Delivery Mode (in-person, online, hybrid)\n• Delivery Style (lecture, role-play, simulation, coaching)\n• Audience (experience level, learning preferences)\n• Budget\n• Content Development time and complexity\n• Timelines and scheduling\n• Communication plan (announcing, supporting, reinforcing)\n• Goals and success metrics\n• Available trainers and SMEs"},{"q":"Q4: Explain professional development and how it applies to salespeople.","a":"Professional Development — Ongoing learning to advance one's career and capabilities. Goes BEYOND initial qualifications for the current role.\n\nFor salespeople:\n• Advanced selling techniques (consultative, strategic)\n• Industry/product expertise\n• Leadership/coaching skills\n• Public speaking and writing\n• Data analysis and CRM mastery\n• Certifications (e.g., government contracting, technical specializations)\n• Stretch assignments that prepare them for promotion\n\nPA EXAMPLE: A B2B sales manager creating a professional development series to prepare staff for government contracts → THE SKILLS SHOULD EXTEND BEYOND THE INITIAL QUALIFICATIONS OF THE JOB POSITION."},{"q":"Q5: Describe the three main areas of analysis in a training needs assessment.","a":"1. Organizational Assessment — Determines the KSAs the company needs to meet strategic objectives. Considers demographics, tech trends, organizational strengths/weaknesses.\n\n2. Occupational (Task) Assessment — Looks at specific tasks, skills, knowledge, and abilities required to do jobs within the organization.\n\n3. Individual Assessment — Examines performance of a single employee to determine what training is needed for that person."},{"q":"Q6: What are the three activities needed to analyze a training audience?","a":"1. Identify learner characteristics — Roles, experience levels, prior training, demographics, learning styles.\n2. Determine current skill levels — What do they already know vs. what's needed?\n3. Identify motivation and readiness — Are they ready to learn? What incentives or barriers exist?"},{"q":"Q7: What are training objectives? Provide at least three examples.","a":"Training Objectives — Specific, measurable outcomes a training program is designed to produce.\n\nExamples:\n1. By the end of training, reps will be able to demonstrate the new product's three key features to a customer.\n2. After completing the workshop, reps will increase their cold-call conversion rate by 15% within 60 days.\n3. Participants will be able to apply the SPIN selling framework correctly in a role-play scenario.\n4. Reps will accurately enter leads into the CRM with 95% data completeness."},{"q":"Q8: Identify the seven elements of the sales training development process and describe two of each.","a":"1. Needs Assessment — Identify gaps; align with strategy.\n2. Set Objectives — Define measurable outcomes; communicate expectations.\n3. Design Content — Choose topics; develop materials.\n4. Select Delivery Method — On-the-job vs off; in-person vs online.\n5. Implement Training — Schedule sessions; deliver consistently.\n6. Evaluate Effectiveness — Use Kirkpatrick or ROI model; gather feedback.\n7. Refine and Repeat — Update content; address gaps for next cycle."},{"q":"Q9: Describe on-the-job training and compare it to off-the-job training.","a":"On-the-Job Training (OJT) — Learning while doing. Mentor or manager guides the employee through real tasks.\n• Pros: Realistic, immediate application, low cost.\n• Cons: Quality depends on mentor; may interrupt customers.\n\nOff-the-Job Training — Classroom, online courses, workshops, simulations, away from daily tasks.\n• Pros: Focused environment, structured curriculum, scalable.\n• Cons: May lack real-world context, more expensive, requires time away from work.\n\nMost companies blend both."},{"q":"Q10: Describe the three types of techniques used to evaluate training effectiveness.","a":"1. Reaction/Feedback — Surveys and interviews to gauge participant reactions (Did they enjoy it? Find it relevant?).\n\n2. Learning Assessments — Tests, quizzes, demonstrations to measure knowledge/skill gain.\n\n3. Performance Assessments — Real-world post-training data: sales increase, error reduction, customer satisfaction, behavior change."},{"q":"Q11: What are the differences between formative and summative assessment?","a":"Formative Assessment — Looks at whether the training program SERVED ITS PURPOSE and finds ways to IMPROVE IT. Conducted during/after training to refine the program.\n\nSummative Assessment — Discovers WHICH PARTICIPANTS ACHIEVED THE LEARNING OBJECTIVES. Final evaluation of learner success.\n\nMemory aid:\n• Formative = Forming/improving the program\n• Summative = Sum/total of learner achievement"},{"q":"Q12: Describe Kirkpatrick's Training Evaluation Model.","a":"Kirkpatrick's Four Levels:\n\n1. Reaction — How did participants react to the training? (Liked it? Found it useful?)\n2. Learning — To what extent did they improve knowledge/skills?\n3. Behavior — Did behavior change as a result of the training? (Are they applying it on the job?)\n4. Results — What benefits did the organization gain? (Sales increase, lower turnover, etc.)"},{"q":"Q13: List and describe the five key elements of the ROI model of training evaluation.","a":"ROI Methodology (extends Kirkpatrick):\n\n1. Reaction and Planned Action — Participant feedback + commitment to apply.\n2. Learning — Knowledge and skill acquisition.\n3. Application and Implementation — On-the-job behavior changes.\n4. Business Impact — Measurable outcomes (revenue, cost savings, retention).\n5. Return on Investment — $ benefit vs. $ cost expressed as a ratio/percentage."},{"q":"Q14: Explain employee orientation and its role in transition.","a":"Employee Orientation — Initial onboarding process to help a new hire transition into the organization or role.\n\nGoals:\n• Set Expectations — Job role, responsibilities, performance standards.\n   PA EXAMPLE: A sales manager meeting a new salesperson to explain roles/responsibilities = SET JOB EXPECTATIONS.\n• Reduce Anxiety — Clear info about what to expect.\n• Reduce Start-up Costs — Faster productivity ramp.\n• Reduce Employee Turnover — Better integration.\n• Save Time — For coworkers (fewer interruptions to ask questions)."},{"q":"Q15: Explain the five steps in the organizational socialization model.","a":"Organizational Socialization Model:\n\n1. New Employee Characteristics — Proactive personality, extraversion, openness, curiosity.\n2. Newcomer Tactics — Information seeking, feedback seeking, relationship building.\n3. Organization Efforts — Socialization tactics, formal orientations, recruitment/realistic previews, organizational insiders.\n4. Adjustment — Role clarity, self-efficacy, insider acceptance, knowledge of org culture.\n5. Outcomes — Satisfaction, commitment, low turnover, performance."},{"q":"Q16: Describe at least three goals of employee orientation.","a":"1. Reduce Start-up Costs — Faster productivity.\n2. Reduce Anxiety — Clear info reduces stress.\n3. Reduce Employee Turnover — Better integration.\n4. Save Time for Coworkers — Less time answering basic questions.\n5. Set Expectations — Role, performance, culture."},{"q":"Q17: Describe the process for developing professional development programs.","a":"1. Identify the strategic capability needs of the organization.\n2. Assess current employee skills/gaps.\n3. Define program goals and target audience.\n4. Design content (topics, formats, sequences).\n5. Choose delivery methods and trainers.\n6. Implement the program with clear schedule and support.\n7. Evaluate impact (Kirkpatrick / ROI).\n8. Refine continuously based on feedback and outcomes."},{"q":"Q18: Explain the five-step process for implementing a professional development program.","a":"1. Plan — Define goals, audience, budget, timeline.\n2. Design — Build curriculum, materials, delivery format.\n3. Communicate — Inform participants and managers; gain buy-in.\n4. Deliver — Roll out training; ensure consistent quality.\n5. Evaluate and Sustain — Measure outcomes; refresh content; reinforce on the job."},{"q":"Q19: Discuss factors influencing the choice of training methods and importance of training in sales effectiveness.","a":"Factors influencing method choice:\n• Number of trainees (small group vs large)\n• Geographic distribution (centralized vs remote)\n• Budget and time constraints\n• Topic complexity (simple info → e-learning; complex skills → role-play/coaching)\n• Trainee experience level\n• Required outcomes (knowledge vs behavior change)\n• Available technology\n\nWhy training matters: Even high performers must continually develop to keep up with new products, customers, technology, and competition. Training closes skill gaps and improves Sales Effectiveness directly."},{"q":"Q20: Describe the five different types of training to improve sales effectiveness.","a":"1. Product Training — Features, benefits, applications, competitive positioning.\n2. Sales Skills Training — Prospecting, qualifying, presenting, objection handling, closing.\n3. Process and Systems Training — CRM, sales methodology, internal workflows.\n4. Industry/Market Training — Customer industry trends, regulations, terminology.\n5. Soft-Skills/Power-Skills Training — Communication, empathy, conflict resolution, time management."},{"q":"Q21: Describe three typical training delivery methods.","a":"1. Instructor-Led (Classroom) — In-person sessions; interactive, allows role-play and live coaching.\n\n2. E-Learning (Online/Self-Paced) — Modules, videos, quizzes accessed any time. Scalable, consistent, lower cost.\n\n3. On-the-Job / Blended Learning — Mentoring, shadowing, real-world tasks combined with formal coursework."}]},{"title":"Module 9: Sales Compensation","cards":[{"q":"Q1: Discuss the importance of compensation packages in attracting and retaining top sales talent.","a":"Compensation packages:\n• Attract top performers (competitive comp = better candidate pool)\n• Reduce turnover (fair, motivating pay keeps reps)\n• Drive desired behaviors (commission rewards selling activity)\n• Align reps with company goals (quotas/incentives target priorities)\n• Signal value of the role (well-paid = important position)\n• Differentiate the company in a tight labor market\n\nPoorly designed comp drives unwanted behavior, fairness complaints, and attrition."},{"q":"Q2: Analyze the role of compensation in motivating employees, improving morale, and increasing loyalty.","a":"Compensation impacts:\n• Motivation — Variable pay (commission, bonus) directly motivates effort toward measurable outcomes.\n• Morale — Fair, transparent pay practices boost morale; perceived inequity destroys it.\n• Loyalty — Long-term incentives (vesting stock, deferred comp, profit-sharing) tie reps to the company.\n• Performance — Rewards reinforce the behaviors managers want repeated.\n\nPay alone isn't a sustained motivator unless: (1) tied to performance, (2) significant amount, (3) clearly understood, (4) timely."},{"q":"Q3: Describe the three typical types of compensation for salespeople.","a":"1. Salary — Fixed pay regardless of sales performance. Provides security/stability.\n\n2. Commission — Variable pay tied directly to sales (% of sales or fixed $ per unit).\n\n3. Salary + Commission (Mix) — Combines stability of salary with motivation of commission. Most common in modern B2B sales."},{"q":"Q4: Explain recoverable draw and nonrecoverable draw. How does a nonrecoverable draw differ from a salary?","a":"Draw Against Commission — A regular payout to give commissioned reps financial stability; deducted from commissions owed.\n\nRecoverable Draw — Company EXPECTS to get the draw back. If a rep draws $1,000 but earns less in commission, they owe the difference.\n\nNonrecoverable Draw — Company does NOT expect to get it back. Rep keeps the payout even if commissions don't cover it. Common for new employees.\n\nNonrecoverable Draw vs Salary:\n• Salary is permanent base pay.\n• Nonrecoverable draw is temporary, tied to a commission plan, often used during ramp-up.\n\nPA EXAMPLE: A real estate office paying new employees $3,000/mo for sales made; they keep it whether or not they make 3+ sales = NON-RECOVERABLE DRAW."},{"q":"Q5: Explain the advantages and disadvantages of a salary.","a":"Advantages:\n• Provides security and stability.\n• Easy for managers to forecast budget costs.\n• Reduces stress for reps.\n• Encourages team collaboration (no commission rivalry).\n\nDisadvantages:\n• Doesn't offer much motivation (no incentive to perform beyond the minimum).\n• Top performers feel under-rewarded.\n• Hard to differentiate pay among performers.\n• Less attractive to high-driven sales talent."},{"q":"Q6: Explain the advantages and disadvantages of commissions.","a":"Advantages:\n• Encourages high level of selling effort.\n• Easy to administer.\n• Financially attractive; leads to improved performance.\n• Helps attract skilled, top-performing salespeople.\n\nDisadvantages:\n• Can result in substantial discounting to promote sales.\n• Can lead to high-pressure sales tactics.\n• Aggressive culture may cause stress and burnout.\n• Low income security (no sales = no pay).\n• May discourage non-selling activities (training, admin, teamwork).\n\nPA EXAMPLE: A vendor compensated per unit sold (e.g., hot dogs at a stadium) = PIECE-RATE compensation (a form of commission)."},{"q":"Q7: Explain the advantages and disadvantages of salary + commissions.","a":"Advantages:\n• Sense of stability — reps still paid even when training, in slow markets, or volatile periods.\n• Reduces necessity for high-pressure tactics.\n• Adjusting the mix can drive different behaviors (aggressive vs consultative).\n\nDisadvantages:\n• Complexity of administering — calculating two pay components per period.\n• Plan design must balance base/variable correctly to motivate without overpaying."},{"q":"Q8: Describe the five key aspects of reward systems in organizations.","a":"1. Functions Served by Reward Systems — Attract, retain, motivate, drive behavior.\n\n2. Basis for Reward Distribution\n   a. Power\n   b. Equality\n   c. Performance Appraisals\n   d. Distributive Justice — Employees receive (at least a portion of) rewards as a function of their level of contribution.\n\n3. Intrinsic vs Extrinsic Rewards\n   a. Extrinsic — External (wages, fringe benefits, bonuses, promotions, recognition).\n   b. Intrinsic — Self-administered (task accomplishment, autonomy, personal growth).\n\n4. Relationship Between Money and Motivation — Money motivates only when it meets specific conditions.\n\n5. Pay Secrecy — Whether pay is open or confidential."},{"q":"Q9: Describe the areas influenced by reward systems.","a":"Reward systems influence:\n• Job effort and performance\n• Attendance and retention\n• Employee commitment to the organization\n• Job satisfaction\n• Occupational and organizational choice (which jobs people pick)"},{"q":"Q10: What are the four methods used to distribute available rewards?","a":"1. Power — Rewards distributed based on the recipient's power/position in the org.\n2. Equality — Everyone receives equal reward regardless of contribution.\n3. Performance Appraisals — Rewards based on documented performance review.\n4. Distributive Justice — Rewards proportional to each individual's contribution."},{"q":"Q11: Is money a primary motivator? Why or why not? Four conditions for pay to be a strong motivator?","a":"Money is NOT a sustained primary motivator on its own. Job content, recognition, autonomy, and growth often matter more.\n\nFor pay to be a strong motivator, four conditions must be present:\n1. Pay must be valued by the employee.\n2. Pay must be tied directly to performance (visible link between effort and reward).\n3. The amount must be significant enough to be meaningful.\n4. Reward must be timely (close enough to the performance to reinforce it)."},{"q":"Q12: Explain incentive programs and their significance in motivating performance.","a":"Incentive Program — A structured plan offering additional rewards beyond base compensation for achieving specific goals.\n\nSignificance:\n• Drives focus on priority goals (e.g., new product launch, new logos)\n• Creates excitement and short-term energy\n• Rewards top performers and pushes mid-performers\n• Aligns sales effort with company strategy\n\nPA EXAMPLE: A sales manager setting goals and offering a 10% bonus if all sales goals are met = PERFORMANCE INCENTIVE program."},{"q":"Q13: Discuss factors when designing an effective incentive program.","a":"Effective incentive programs consider:\n• Target audience's MOTIVATION — what drives them?\n• SKILLS — can they realistically reach the goal?\n• RECOGNITION — public + private acknowledgment\n• Clear UNDERSTANDING of goals — simple, transparent rules\n• MEASUREMENT of progress — visible scoreboards\n• Achievable but stretch goals\n• Fairness and consistency\n• Timely payout\n• Clearly communicated rules (no surprises)"},{"q":"Q14: Explain the elements of a total compensation package for a typical salesperson.","a":"Total Compensation Package elements:\n• Base Salary — Fixed regular pay.\n• Commission — Variable, tied to sales.\n• Bonuses — Lump-sum for specific achievements.\n• SPIFs (Sales Performance Incentive Funds) — Short-term targeted rewards.\n• Benefits — Health, dental, vision, retirement, life/disability insurance.\n• Non-cash perks — Car allowance, laptop, phone, club memberships, expense accounts, training/education, recognition trips.\n• Stock Options / Profit Sharing — Long-term ownership.\n• Paid Time Off — Vacation, sick, holidays."},{"q":"Q15: Explain differences between rewards and incentives with examples.","a":"Reward — Given AFTER performance is achieved. Reinforces what already happened.\nExamples: Annual bonus, \"Salesperson of the Year\" award, raise.\n\nIncentive — Promised BEFORE performance to motivate it. Pulls behavior forward.\nExamples: \"Hit quota and win a trip to Hawaii\"; SPIF for selling new product line.\n\nPA EXAMPLE: A pharmaceutical sales manager offering a Hawaii trip to the top performer = a SALES PERFORMANCE INCENTIVE FUND (SPIF) program."},{"q":"Q16: Discuss SPIFs and their role in driving sales for specific objectives.","a":"Sales Performance Incentive Fund (SPIF) — A short-term incentive to encourage sales for a specific item, group of items, or strategic objective.\n\nUses:\n• Push slow-moving inventory\n• Launch a new product\n• Win business in a new territory\n• Beat a competitor's promotion\n• Hit a quarter-end target\n\nCharacteristics:\n• Time-bounded\n• Specific in scope\n• Often cash, gift cards, or trips"},{"q":"Q17: List and describe at least five non-cash benefits.","a":"Common non-cash benefits:\n1. Company car or car allowance\n2. Health/dental/vision/life insurance\n3. Retirement plan (401(k) match, pension)\n4. Paid time off (vacation, sick, holidays, parental leave)\n5. Tuition reimbursement / professional development\n6. Stock options or RSUs\n7. Recognition awards/trips\n8. Flexible work / remote-work options\n9. Wellness programs and gym memberships"},{"q":"Q18: Discuss fringe benefits and perks and their significance in attracting/retaining talent.","a":"Fringe Benefits — Indirect compensation (insurance, retirement, leave, etc.).\n\nPerks — Additional perks like flex schedules, home-office stipends, club memberships, parking, free meals.\n\nSignificance:\n• Differentiate the offer from competitors\n• Address employee priorities outside cash (health, family, growth)\n• Improve overall job satisfaction\n• Increase retention and reduce turnover costs\n• Strengthen employer brand"},{"q":"Q19: Discuss approaches within individual incentive plans (merit-based, piece-rate, bonus, commissions) and their direct linkage to performance.","a":"Merit-Based Compensation — Pay raise tied to performance review. Annual bump based on rating.\n\nPiece-Rate Incentive Programs — Employee paid for each unit produced/sold at a fixed rate.\nPA EXAMPLE: A vendor paid per hot dog/lemonade sold = PIECE-RATE.\n\nBonus Systems — Lump-sum for hitting a target (deal, quarter, year).\n\nCommissions — % of sales (or $ per unit). Direct link between sale and pay.\n\nAll four directly tie pay to individual output but vary in time horizon, predictability, and behavior they incentivize."},{"q":"Q20: Describe the guidelines for increasing the effectiveness of incentive programs.","a":"Guidelines:\n• Clearly communicate rules and goals\n• Make goals attainable but challenging\n• Keep the program simple to understand\n• Tie rewards directly to company goals\n• Use a mix of cash and non-cash rewards\n• Ensure timely payout to reinforce behavior\n• Recognize publicly to amplify motivation\n• Avoid pitting reps against each other in destructive ways\n• Periodically refresh to prevent fatigue"},{"q":"Q21: Discuss factors that make sales compensation planning a complicated process.","a":"Compensation planning is complex because of:\n• Multiple components (salary, commission, bonus, SPIF, benefits)\n• Different roles (hunters vs farmers, inside vs outside)\n• Quotas and territory differences\n• Performance-based raises layered on top of variable pay\n• Sales organization structure (geography, product, customer)\n• Tax and legal compliance (FLSA, state laws)\n• Cost containment vs. competitive market rates\n• Forecasting payouts under variable scenarios"},{"q":"Q22: Explain trade-offs and decisions sales managers may face to control costs.","a":"Cost-control trade-offs include:\n• Layoffs — Cuts payroll but loses experience and morale.\n• Overtime — Short-term productivity gain; long-term burnout/cost.\n• Benefits Reduction — Saves money; hurts retention and recruitment.\n• Pay Raises — Boosts morale; increases ongoing fixed cost.\n• Outsourcing parts of the sales cycle — Lower cost; less control.\n• Reducing commissions — Cuts variable cost; demotivates reps.\n\nDecisions must balance short-term cost savings against long-term performance and culture."},{"q":"Q23: List the key points to understand when building an effective compensation plan.","a":"Key points:\n• Align with strategy — Pay should drive what the company wants.\n• Be competitive in the labor market.\n• Mix base/variable to balance security and motivation.\n• Tie variable pay to clear, measurable performance.\n• Be transparent and consistent.\n• Include both short- and long-term incentives.\n• Forecast cost under multiple scenarios.\n• Review and adjust annually.\n• Comply with all wage/tax/labor laws."}]},{"title":"Module 10: Salesperson Evaluation","cards":[{"q":"Q1: What are the key considerations and challenges in conducting sales performance appraisals?","a":"Key considerations:\n• Alignment of metrics with strategy (e.g., revenue vs. margin vs. retention)\n• Mix of objective and subjective measures\n• Frequency (annual vs. quarterly vs. continuous)\n• Calibration across managers\n• Connection to compensation, promotion, training, termination\n• Legal defensibility (documentation)\n• Avoiding rater errors (halo, recency, similarity, leniency, central tendency)\n\nChallenges:\n• Limited control over external factors (economy, competition)\n• Different roles need different criteria\n• Bias in subjective ratings\n• Time-consuming to do well\n• Reps may game whatever you measure"},{"q":"Q2: How do appraisal methodologies vary based on type of work and roles within sales?","a":"• Order Takers (transactional) — Mostly objective metrics: orders processed, accuracy, call volume, customer satisfaction.\n\n• Order Getters (B2B/complex sales) — Mix of objective (revenue, quota attainment, pipeline) and subjective (consultative selling skills, account development).\n\n• Key Account Managers — Long-term relationship metrics, account growth, retention, NPS.\n\n• Inside Sales — Activity metrics (calls, demos, conversion ratios) and revenue.\n\n• Sales Managers — Team performance, coaching, planning, hiring quality.\n\nThe methodology should match what success looks like for that role."},{"q":"Q3: Explain objective and subjective sales performance measures with examples.","a":"Objective Measures — Direct, simple, quantifiable data points.\n• Sales calls made\n• Sales figures / revenue / units sold\n• Conversion ratio\n• Quota attainment\n• Number of new accounts opened\n\nSubjective Measures — Qualitative; what is done and how well it's done. Focus on benchmarks for constructive criticism.\n• Job knowledge\n• Customer relationship quality\n• Communication skills\n• Teamwork\n• Attitude\n\nPA EXAMPLE: A manager evaluating how a salesperson's CHARACTERISTICS aided in closing sales is using SUBJECTIVE PERFORMANCE MEASURES."},{"q":"Q4: Describe sales performance ratios including expense ratios, account development ratios, and call activity ratios.","a":"Expense Ratios — How much it costs to achieve sales outcomes.\n• Cost per Call = Total Costs / Number of Calls\n• Cost per Quota = Total Costs / Sales Quota\nPA EXAMPLE: To determine the COST of converting prospects to customers over a year → use EXPENSE ratio category.\n\nAccount Development Ratios — How well salespeople earn potential business in their territory.\n• Sales per Account = Sales $ Volume / Total Number of Accounts\n• Average Order Size = Sales $ Volume / Total Number of Orders\n\nCall Activity Ratios — Effort/planning in customer call activities.\n• Calls per Day = Number of Calls / Days Worked\n• Planned Call Ratio = Number of Planned Calls / Total Number of Calls\n\nSales Effectiveness Index = (Calls/Days Worked) × (Orders/Calls) × (Sales/Orders)"},{"q":"Q5: Describe three ways to seek customer feedback. Four ways customer feedback can be collected.","a":"Three Ways to Seek Customer Feedback:\n1. Account Visits — Face-to-face meetings (more effective than phone/email).\n2. Business Reviews — Formal reviews providing open, direct feedback. Reviews business state and gathers performance info.\n3. Conventions — Industry events offering informal customer feedback opportunities.\n\nFour Ways Feedback Can Be Collected:\n1. Surveys (online, in-person, mailed)\n2. Direct interviews\n3. Net Promoter Score (NPS) tracking\n4. Social media monitoring / online reviews / call-center transcripts"},{"q":"Q6: Explain the five common uses of performance appraisals.","a":"1. Feedback to Salespersons — Helps them understand performance and improve.\n2. Self-Development — Identifies areas for personal/professional growth.\n3. Reward Systems — Determines pay raises, bonuses, promotions.\n4. Personnel Decisions — Promotions, transfers, terminations.\n5. Training and Development — Identifies team-wide and individual training needs."},{"q":"Q7: What are the common sources of error in performance appraisal systems and how do they impact evaluation?","a":"Common rater errors:\n• Validity issues — Tool doesn't measure what it should.\n• Reliability issues — Inconsistent across raters/time.\n• Personal Bias — Rater's preferences color the rating.\n• Central Tendency Error — Failure to recognize very good or very bad performers; everyone rated as \"average.\"\n• Strictness/Leniency Error — Overly strict or lenient ratings.\n• Halo Effect — Manager assigns the same rating to each factor based on overall positive/negative impression.\n• Confirmatory Bias — Search for info that confirms pre-existing beliefs.\n• Similarity Bias — Favoring people similar to the rater.\n• Recency Error — Focus on most recent behavior rather than entire period.\n   PA EXAMPLE: Basing rating on the entire period rather than just the last two months means avoiding RECENCY ERROR.\n\nImpact: Unfair, inaccurate, demotivating evaluations that fail to drive improvement."},{"q":"Q8: Approaches used to reduce errors in performance appraisal.","a":"• Use behaviorally anchored rating scales (BARS) and behavioral observation scales (BOS) to focus on observable behavior.\n• Train raters on common errors and how to avoid them.\n• Use multiple raters (360-degree feedback).\n• Calibrate ratings across managers.\n• Document specific examples (critical incidents).\n• Use data + observation, not just impressions.\n• Conduct ratings on a regular cadence so recency doesn't dominate.\n• Separate evaluation from compensation discussions when possible."},{"q":"Q9: Describe the tools used for performance measurement.","a":"a. Graphic Rating Scales — Most common. 5-7 point scale; assess specific characteristics. Useful to track improvement over time.\n\nb. Critical Incident Method — Manager keeps a running tally of specific good and bad incidents.\n\nc. Behaviorally Anchored Rating Scale (BARS) — Combines critical incidents with rating scale; specific behaviors anchor each scale point.\n\nd. Behavioral Observation Scale (BOS) — Frequency rating of specific job behaviors.\n\ne. Management by Objectives (MBO) — Manager and subordinate jointly set quantitative performance goals and evaluate against them.\n   PA EXAMPLE: A manager and subordinate setting relevant, quantitative performance goals together = MBO.\n\nf. Assessment Centers — Multiple methods (interviews, simulations, tests) used to evaluate.\n\ng. Sales Analysis — Data-driven review of sales metrics.\n\nh. Self-Evaluations — Salesperson rates themselves.\n\ni. 360-Degree Feedback — Input from manager, peers, direct reports, and customers.\n\nPA NOTE: A manager focusing on a salesperson's CHARACTERISTICS that aided closing sales = SUBJECTIVE measure (often via BARS or self-evaluation)."}]},{"title":"Module 11: Budgeting & Planning","cards":[{"q":"Q1: Explain the purpose of budgeting and how forecasting is used to determine a financial plan.","a":"Purpose of Budgeting:\n• Plan and control use of scarce resources\n• Reveal company objectives and how management intends to acquire/use resources\n• Provide comparison of actual results to the plan\n\nRole of Forecasting:\n• Forecasting predicts the OUTCOME of events (sales, costs, demand) and is the essential STARTING POINT for budgeting.\n• The sales forecast informs all other organizational budgets.\n• Budgeting then optimizes scarce resources and sets a defined path to achieve the mission."},{"q":"Q2: How does an accurate budget benefit sales managers?","a":"An accurate budget:\n• Sets clear targets for revenue and expense\n• Allocates resources (people, marketing, tools) to highest-value opportunities\n• Provides early warning of variance (over/under budget)\n• Enables data-driven decisions on hiring, comp, expansion\n• Supports executive conversations about strategy\n• Holds the team accountable to specific outcomes\n• Reduces surprises and crisis-mode decisions"},{"q":"Q3: Describe the three-step process for sales forecasting.","a":"1. Survey current ECONOMIC and BUSINESS conditions.\n2. Develop an INDUSTRY-SPECIFIC sales forecast after looking at competitors' past, present, and future activity.\n3. Forecast the COMPANY'S share of the market while considering current business, marketing, and sales planning activities."},{"q":"Q4: Explain the differences between budgeting and forecasting.","a":"Forecasting:\n• Predicts the future financial outcome\n• Strategic plan\n• Can be over any period\n• Based on historical records or research\n• Flexible\n\nBudgeting:\n• Outlines income and expenditures\n• Tactical plan\n• Generally annual\n• Based on the sales forecast\n• Static (locked once approved)\n\nTogether: Forecast first → Budget after."},{"q":"Q5: Explain how CRM software can be used in sales forecasting.","a":"CRM provides:\n• Pipeline data (deals at each stage with probabilities)\n• Historical sales by rep, product, customer, region\n• Win/loss patterns\n• Average deal size and sales cycle length\n• Real-time activity data (calls, demos, meetings)\n\nUse in forecasting:\n• Apply weighted probabilities to pipeline\n• Compare current pipeline to historical conversion rates\n• Identify gaps in coverage early\n• Run \"what if\" scenarios for different growth assumptions"},{"q":"Q6: Describe the two key outputs of the sales budget.","a":"1. Sales Budget (Revenue) — Forecasted revenue from product/service sales over a period (units × price).\n\n2. Selling Expense Budget — All costs to generate the forecasted sales: salaries, commissions, travel, advertising, sales tools, training, etc.\n\nThe Sales Budget feeds the Production Budget and informs all other operating budgets."},{"q":"Q7: Describe the relationship between the sales and production budgets.","a":"• Sales Budget is the FOUNDATION; informs the Production Budget.\n• Production Budget uses the forecasted UNIT sales for the year + required ending inventory − beginning inventory to determine production quantities.\n• Production Budget is developed in UNITS first, then translated to dollars.\n• Mismatch leads to stockouts (under-producing) or excess inventory (over-producing)."},{"q":"Q8: Describe the components of direct and indirect costs.","a":"Direct Costs — Can be directly traced to a product, service, customer, project, or function.\n• Direct Materials — Materials used only for that product.\n• Direct Labor — Labor of employees actually working on the product.\n• Commissions, piece-rate wages, manufacturing supplies.\n\nIndirect Costs — Cannot be easily traced to a single cost object; serve multiple cost objects.\n• Administrative salaries\n• HR salaries and benefits\n• Supervisor salaries\n• Quality control costs\n• Insurance, depreciation\n• Market research"},{"q":"Q9: Distinguish between fixed costs and variable costs with examples.","a":"Fixed Costs — Costs that must be paid regardless of how much is produced or sold.\nExamples: Rent, insurance, base salaries, equipment depreciation.\n\nVariable Costs — Change with the level of production or sales. Affected by business activity.\nExamples: Shipping, raw materials, sales commissions, office supplies, legal expenses tied to deals."},{"q":"Q10: Describe the selling and administrative budget with examples of types of costs.","a":"Selling and Administrative Budget — All non-manufacturing costs related to selling products and running the business.\n\nSelling Examples:\n• Sales salaries and commissions\n• Travel and entertainment\n• Advertising and promotions\n• Sales tools (CRM, demos)\n• Training costs\n\nAdministrative Examples:\n• Executive salaries\n• HR/Finance salaries\n• Office rent and utilities\n• Legal and audit fees\n• IT/admin software"},{"q":"Q11: Explain contribution margin and how it is calculated.","a":"Contribution Margin — Sales minus variable expenses. Tells what's left to cover fixed expenses and produce a profit AFTER variable costs.\n\nFormula:\nContribution Margin = Sales − Manufacturing Variable Costs − Variable Costs Attributed to the Department\n\nWhy managers use it:\n• Determines how much sales must increase or expenses must decrease to break even.\n• Used to evaluate product profitability, pricing, and cost decisions.\n\nPA EXAMPLE: A sales manager designing commissions based on each salesperson's MONTHLY SALES LESS VARIABLE EXPENSES is using the CONTRIBUTION MARGIN income statement basis."},{"q":"Q12: Describe the four ways sales departments can be organized.","a":"Four ways (departmentalization):\n1. By Function — Specialists in roles (prospecting, closing, account management).\n2. By Product — Reps aligned to product lines.\n3. By Customer Type — Reps focused on key accounts, SMB, retail, etc.\n4. By Geography — Reps assigned to regions/territories.\n\nChoice depends on customer complexity, product complexity, geography, and growth strategy."},{"q":"Q13: Describe the effects of an economic downturn on company sales and income.","a":"Economic downturn effects:\n• Reduced customer demand → lower sales volume\n• Buyers delay purchases or shift to cheaper alternatives → lower revenue per sale\n• Pricing pressure → lower margins\n• Lengthening sales cycles → cash flow strain\n• Higher customer churn / bankruptcies among buyers → bad debt\n• Layoffs and cost cuts → reduced sales capacity\n• Competitive intensity increases as everyone fights for fewer dollars"},{"q":"Q14: Discuss the options for outsourcing parts of the sales cycle.","a":"Sales-cycle outsourcing options:\n• Lead generation (third-party telemarketing or BDR firms)\n• Sales development / appointment setting\n• Inside sales / contract sales reps\n• Field sales via manufacturer's reps or independent agents\n• Customer service / support call centers\n• Distribution and fulfillment\n• CRM administration and data enrichment\n\nCompanies pick which steps to keep in-house based on strategic value and cost."},{"q":"Q15: Discuss benefits and drawbacks of outsourcing all or part of the sales cycle.","a":"Benefits:\n• Gain access to more buyers/markets\n• Often less expensive (variable cost vs fixed payroll)\n• Access to specialized expertise\n• Lower labor costs and benefits/training spend\n• Faster to scale up or down\n\nDrawbacks:\n• LOSS OF CONTROL\n• Sellers can decide which products to push\n• Communication issues\n• Cultural impact (less integrated team)\n• Quality control problems\n• Customer experience consistency\n• Brand risk if outsourced reps misrepresent"},{"q":"Q16: Identify the five steps in Activity-Based Costing (ABC).","a":"5 Steps in ABC:\n1. Identify Activities that consume resources and assign costs to those activities. Goal: identify activities salespeople perform regularly to sell.\n2. Identify Cost Drivers associated with each activity. (Cost Driver = activity/transaction that incurs costs.)\n3. Calculate Activity Rates: Activity Rate = Estimated Overhead / Estimated Base Units or Cost Driver\n4. Define an Activity Center (a unit of the organization performing the activity). Applied Overhead = Actual Cost Driver × Activity Rate.\n5. Make Decisions Based on the Results.\n\nHelps management plan and control to meet org goals by giving a more accurate view of where costs really come from."},{"q":"Q17: Compare and contrast Full Product Costing and Activity-Based Costing.","a":"Full Product Costing (Absorption Costing):\n• Considers EVERY cost incurred by the business\n• Direct costs traced to cost objects\n• Indirect/overhead costs allocated (often arbitrarily)\n• End-to-end manufacturing costs assigned to finished products\n• Treats all manufacturing costs (fixed AND variable) as product costs\n\nActivity-Based Costing (ABC):\n• Considers costs associated with specific activities\n• Often used to analyze internal processes\n• Only considers costs directly traceable to a product or process\n• Provides more detailed/accurate cost numbers\n• Helps identify cost-causing activities\n• Requires teamwork between accounting, production, marketing\n\nPA EXAMPLE: A manager applying a costing method focused on reporting ALL DIRECT costs for internal financial reporting = FULL PRODUCT (CONTRACT/Absorption) costing — NOT activity-based."},{"q":"Q18: Explain the Return on Assets Managed (ROAM) measurement.","a":"Return on Assets Managed (ROAM) — Measures the return produced on inventory and accounts receivable.\n\nFormula:\nROAM = Contribution as a Percent of Sales × Asset Turnover Rate\n\nSteps:\n1. Calculate profit (contribution) as a % of sales.\n2. Divide sales by total assets (asset turnover rate).\n3. Multiply the two results.\n\nTo IMPROVE ROAM (with constant profit margin):\nPA EXAMPLE: Increase the ASSET TURNOVER RATE (sell more with the same assets, or reduce assets like inventory and AR)."},{"q":"Q19: Explain Customer Profitability Analysis. How does Pareto Principle apply?","a":"Customer Profitability Analysis — Determines how much profit is generated by each customer or customer segment after all direct and indirect costs are allocated.\n\nPurpose:\n• Identify most/least profitable customers\n• Decide where to focus retention and growth\n• Spot customers that cost more to serve than they're worth\n\nCalculation:\nCustomer Profit = Customer Revenue − Cost of Goods Sold − Cost to Serve (sales, support, returns, etc.)\n\nPareto Principle Applied:\n80% of profit often comes from 20% of customers. Concentrate effort on the most profitable 20% and decide what to do with unprofitable accounts (transform, monitor, or replace)."},{"q":"Q20: Describe the Customer Classification Matrix and the four box matrix.","a":"Customer Classification Matrix (Revenue × Cost to Serve):\n• Carriage Trade — High revenue, expensive to serve. Profitable if cost stays below revenue.\n• Bargain Basement — Low revenue, low cost. Sensitive to price; insensitive to service/quality.\n• Passive Customers — High revenue, low cost. BEST customers (high revenues at lowest costs).\n• Aggressive Customers — Low revenue, high cost. Demand most; pay least. Often kept for non-profit reasons.\n\nFour Box Matrix (Profitability × Strategic Alignment):\n• Retain (Profitable + Aligned with strategy) — Grow these.\n• Transform (Aligned but Unprofitable) — Convert into profitable customers if possible.\n• Monitor (Profitable but Not Aligned) — Maintain but reevaluate regularly.\n• Replace (Unprofitable + Not Aligned) — Raise prices or let go."},{"q":"Q21: Describe the nine categories of sales operations.","a":"Common sales-ops categories:\n1. Sales Strategy and Planning\n2. Sales Forecasting\n3. Quota and Territory Design\n4. Compensation and Incentives\n5. Sales Performance Reporting and Analytics\n6. Sales Process and Methodology\n7. Sales Technology / CRM Administration\n8. Sales Training and Enablement\n9. Sales Communications and Coordination\n\nTogether, these support the front-line sales force."},{"q":"Q22: Describe the sales potential forecast.","a":"Sales Potential Forecast — A forecast of the number of prospects and their buying power. Used to:\n• Determine sales targets\n• Identify territories worthy of an allocation of limited resources\n• Size the sales force\n• Allocate marketing/advertising spend\n\nDifferent from Market Potential (total industry sales) — Sales Potential is the company's expected SHARE of that market."},{"q":"Q23: Explain the RACI Matrix.","a":"RACI Matrix — Describes roles/responsibilities of each project participant or stakeholder in cross-functional or departmental projects.\n\nDefines who is:\nR — Responsible (does the work)\nA — Accountable (owns outcome, final decision)\nC — Consulted (provides input)\nI — Informed (kept aware after decisions)\n\nUsed in sales for: launch projects, account handoffs, complex deals, compensation rollouts."},{"q":"Q24: Describe the four ways top sales teams outperform their competition.","a":"1. Know What Metrics to Measure — Focus on KPIs aligned to strategy.\n2. Keep Sales Costs Low — Efficient deployment, smart use of inside vs outside reps.\n3. Free Up Salespeople So They Can Sell — Automate admin; reduce non-selling time.\n4. Use as Many Channels as Possible — Omnichannel reach increases coverage and conversion."}]},{"title":"Module 12: Forecasting & Quota Development","cards":[{"q":"Q1: Sales forecasting comprises four primary purposes. Explain and how each is utilized.","a":"1. Set Sales Targets/Quotas — Forecast becomes the basis for assigning quotas. Forecast happens BEFORE quotas.\n   PA NOTE: A sales forecast is developed BEFORE quotas are assigned to salespeople.\n\n2. Plan Operations — Production, inventory, hiring, marketing budgets all flow from the forecast.\n\n3. Allocate Resources — Where to invest people, dollars, and time across products/regions.\n\n4. Inform Strategic Decisions — Pricing, expansion, new product launches, capital investment."},{"q":"Q2: For what reasons are quotas used in sales organizations? Identify and describe at least three.","a":"1. Motivate Performance — Provide a clear target reps must reach.\n2. Measure Success — Quota attainment is a key performance indicator.\n3. Allocate Resources/Effort — Helps managers distribute leads, territories, and effort fairly.\n4. Compensation — Many comp plans pay against quota attainment.\n5. Forecasting and Planning — Quota assignments roll up into total forecast.\n6. Identify Problem Performers Early — Clear underachievement triggers coaching or replacement."},{"q":"Q3: List and describe at least four departments that work together during sales forecasting.","a":"1. Sales — Owns the bottom-up forecast from rep/territory pipelines.\n2. Marketing — Provides lead-flow estimates and demand-generation impact.\n3. Finance — Reviews assumptions; integrates the forecast into the master budget.\n4. Operations/Production — Plans capacity and inventory based on unit forecasts.\n5. Executive Leadership — Validates and approves the final forecast.\n\nCross-functional collaboration produces a more accurate forecast than any one function alone."},{"q":"Q4: Describe the internal and external forces that affect sales forecasting.","a":"Internal Forces:\n• Sales force size and skill\n• Product changes/launches\n• Pricing decisions\n• Marketing activity\n• Sales strategy shifts\n\nExternal Forces:\n• Economic conditions (recession, growth)\n• Competitor moves\n• Customer industry trends\n• Regulatory changes\n• Technology shifts\n• Seasonality and cultural events"},{"q":"Q5: Discuss the concepts of market potential, sales potential, and market share.","a":"Market Potential — Total industry-wide sales expected in a product category for the period of interest.\n\nSales Potential — The MAXIMUM total revenue the company hopes to generate from a product (or units it hopes to sell). The company's SHARE of market potential under best conditions.\n\nMarket Share — The actual portion of total industry sales captured by one company.\n\nRelationship: Market Potential ≥ Sales Potential ≥ Actual Sales / Market Share."},{"q":"Q6: Contrast objective and subjective sales forecasting techniques.","a":"Objective (Quantitative) Forecasting — Uses historical DATA and statistical methods. Less costly, accuracy easier to track.\nExamples: Time series, moving averages, exponential smoothing, decomposition.\n\nSubjective (Qualitative) Forecasting — Nonstatistical; relies on OPINIONS. Best when consumer habits change, current data is unavailable, or planning horizon is long.\nExamples: Customer opinions, surveys, sales force composite, jury of executive opinion, expert opinion, Delphi technique."},{"q":"Q7: What are the three factors to consider when selecting a forecasting technique?","a":"1. Availability of Historical Data — Quantitative methods need clean historical data.\n\n2. Stability of the Market/Product — Stable markets favor time-series; volatile or new markets favor qualitative.\n\n3. Time Horizon and Resources — Short-term and quantitative are quicker; long-term planning often needs qualitative input."},{"q":"Q8: Describe common subjective (qualitative) forecasting techniques.","a":"1. Customer Opinions — Direct input from customers about future buying.\n\n2. Customer Surveys — Structured questionnaires.\n   Advantage: Provides DETAILED USER INFORMATION.\n   PA NOTE: An advantage of customer surveys is that they PROVIDE DETAILED USER INFORMATION.\n\n3. Sales Force Composite — Each rep estimates their territory; rolled up.\n   Expected Value = Forecasted Sales × Respective Probability\n\n4. Jury of Executive Opinion — Best-guess estimates of company executives.\n\n5. Expert Opinion — Industry experts outside the company.\n\n6. Delphi Technique — Group decision-making collating successive expert judgments anonymously across rounds.\n   Disadvantage: TIME-CONSUMING IN GENERATING RESULTS."},{"q":"Q9: Two ways to improve effectiveness of sales estimates from sales reps (assumptions and EVA).","a":"1. Assumptions — Have reps state the key assumptions behind their estimate (e.g., \"Assumes new product launches Q2; assumes Acme deal closes by month-end\"). Surfaces risks and lets managers stress-test.\n\n2. EVA (Expected Value Analysis) — Multiply forecasted sales by the probability of close.\n   Expected Value = Forecasted Sales × Probability\n   Reduces over-optimistic forecasts by weighting deals by likelihood."},{"q":"Q10: Describe common objective (quantitative) forecasting techniques.","a":"Time Series Techniques — Examines past sales patterns/trends to predict future. Useful in stable markets. Data bucketed into periods. Assumes a 3% growth last year → 3% next year.\n\nTime Series Analysis — Decomposes data into trend, seasonality, cycles, noise.\n\nRollover Technique — Actual sales results from one period copied to the next as the forecast. Works for stable businesses with little seasonality.\n\nSimple Moving Average — Average of last N periods.\n\nWeighted Moving Average — Recent periods weighted more than older periods.\n\nExponential Smoothing — Uses ALL past data but weights the MOST RECENT observations the heaviest. Smoothing factor between 0 and 1; closer to 1 = more weight to recent.\nPA EXAMPLE: A manager forecasting using ALL sales since start of business but assigning HIGHER weight to recent and LOWER weight to old data = EXPONENTIAL SMOOTHING.\n\nAverage Daily Sales — Total sales divided by days.\n\nDecomposition — Decomposes time series into trend, seasonality, cycles, noise. Used when data are divided into multiple segments for analysis.\nPA EXAMPLE: A manager dividing sales data into FOUR SEGMENTS for analysis = TIME SERIES (decomposition) approach."},{"q":"Q11: What is a market test and why is it used?","a":"Market Test — A controlled launch of a product in a limited market (region or customer segment) to measure actual customer response before broad rollout.\n\nWhy used:\n• Validate demand assumptions in the real world\n• Test pricing, packaging, promotion\n• Estimate full-scale sales potential\n• Reduce risk of a costly nationwide failure\n• Refine marketing and sales execution before scale-up"},{"q":"Q12: Describe methods for building better sales forecasts.","a":"Best practices:\n• Combine quantitative + qualitative methods\n• Get input from multiple departments (sales, marketing, finance, ops)\n• Use CRM pipeline data with realistic close probabilities\n• Document assumptions\n• Update frequently (rolling forecast vs annual lock)\n• Review variance and learn from forecasting errors\n• Avoid sales rep over-optimism with EVA / probability weighting\n• Stress-test with multiple scenarios (best/likely/worst)"},{"q":"Q13: Describe the five steps in the quota-setting procedure.","a":"1. Determine total sales forecast and goals.\n2. Break down forecast by product, region, customer segment.\n3. Allocate quotas across territories/reps based on historical performance and potential.\n4. Communicate quotas with rationale and incentive structure.\n5. Monitor, adjust mid-period if conditions change, and review at year-end."},{"q":"Q14: Describe the five steps in the quota development process.","a":"1. Analyze the sales forecast and corporate goals.\n2. Examine historical performance (past performance baselines).\n3. Apply external factors (market index, competitive activity).\n4. Set individual quotas using a method (Breakdown, Workload, Incremental, Past Performance, Market Factor, Market Index).\n5. Communicate clearly, then track progress."},{"q":"Q15: What are the ethical implications of setting quotas related to sales compensation?","a":"Ethical implications:\n• Unrealistic quotas can encourage reps to misrepresent products to close sales.\n• Excessive pressure can lead to bait-and-switch or hidden fees.\n• Channel stuffing (booking sales not really wanted) artificially hits quota.\n• Creating accounts that don't exist or fraudulent activity (e.g., Wells Fargo).\n• Retaliation against reps for missed quotas due to factors beyond their control.\n• Quotas tied to specific high-margin products may push customers into the wrong fit.\n\nManagers must set fair, achievable quotas + monitor for unethical behavior + foster an ethical culture."},{"q":"Q16: Explain direct and overlay quotas.","a":"Direct Quotas — Quotas assigned directly to a salesperson responsible for the territory or accounts.\n\nOverlay Quotas — Quotas assigned to people who SUPERVISE OR SUPPORT the sales reps (e.g., specialists, sales engineers, managers). They get credit when their reps close deals tied to their support."},{"q":"Q17: Describe the four types of quotas with examples.","a":"1. Profit/Revenue Quotas — Based on selling enough units/subscriptions to generate gross profit or margin. Usually monthly/quarterly.\n   Example: Sell low quota of expensive product vs higher quota of cheaper product.\n\n2. Activity Quotas — Activities like # of new clients, calls made, emails answered, bookings, deals.\n   Example: 45 calls + 85 emails + 15 demos per month.\n\n3. Volume Quotas — Registering new users or moving inventory. Monthly/quarterly. Often team-based.\n   Example: Sell 100 units by end of month.\n\n4. Combination Quotas — Mix of revenue, volume, AND activity.\n   Example: 50 calls + 20 demos + close $2,500 of business after expenses.\n   PA EXAMPLE: A quota using \"multiple factors such as proceeds and sales capacity\" = COMBINATION quota."},{"q":"Q18: Describe methods used to set sales quotas.","a":"1. Jury of Executive Opinion — Top managers collectively set quotas.\n2. Sales Force Composite — Reps estimate their own; rolled up to set quotas.\n3. Past Performance — Use prior years' sales as a baseline (often + a growth target).\n4. Market Factor — Any external factor (e.g., housing starts) that affects demand.\n5. Market Index — Combination of market factors used to estimate likely sales level.\n\nMethods are often combined for accuracy."},{"q":"Q19: Explain the six common mistakes organizations make when setting quotas.","a":"1. Setting unrealistic quotas (too high → demoralizes; too low → leaves money on table).\n2. Ignoring territory differences (uneven potential).\n3. Not aligning quotas to corporate strategy.\n4. Failing to communicate the rationale clearly.\n5. Not adjusting for major changes (recession, product issues).\n6. Linking quotas to comp without ethical safeguards (creates incentive for bad behavior).\n\nBest practice: Ask for less than you think reps can deliver; compare to past performance, not forecasts; ensure comp plan lets reps make money when the company does."},{"q":"Q20: Describe the pros and cons of increasing the size of the sales force.","a":"Pros:\n• More territory coverage\n• More customer contact\n• Higher revenue potential\n• Better customer service through smaller territories\n\nCons:\n• Higher fixed/variable costs (salaries, benefits, expenses)\n• Diminishing returns (Law of Decreasing Returns: each new rep adds less marginal revenue)\n• Increased management complexity\n• Risk if revenue doesn't grow proportionally\n• Territory disputes from realignment"},{"q":"Q21: Describe the Breakdown Method of determining sales force size.","a":"Breakdown Method — Divides expected sales by per-rep productivity.\n\nFormula:\nNumber of Sales Personnel Needed = Forecasted Sales Volume / Estimated Productivity of One Sales Rep\n\nExample: If you need $10M in sales and one rep produces $1M, you need 10 reps.\n\nPros: Simple, easy to calculate.\nCons: Doesn't account for territory differences or customer complexity."},{"q":"Q22: Describe the Workload Method of determining sales force size.","a":"Workload Method — All sales reps should have an equal share of the workload.\n\nFormula:\nNumber of Sales Reps = (NC × FC × LC) / TA\n\nWhere:\n• NC = Number of Customers\n• FC = Average Frequency of Calls per Customer\n• LC = Average Length of Customer Calls\n• TA = Time an average sales rep has available for selling per year\n\nPros: Accounts for customer count, frequency, and call length. More realistic than Breakdown.\nCons: Requires accurate estimates of all variables."},{"q":"Q23: Describe the Incremental Method of determining sales force size.","a":"Incremental Method — Continue adding sales reps as long as the marginal revenue from each new rep exceeds (or equals) the marginal cost.\n\nConcepts:\n• Marginal Revenue — Revenue gained from one additional unit (rep).\n• Marginal Cost — Cost incurred by adding that one unit.\n• Law of Decreasing Returns — At some point, adding another input (rep) results in smaller increases in output.\n\nStop hiring when marginal revenue = marginal cost.\n\nPros: Economically optimal sizing.\nCons: Difficult to estimate marginal revenue accurately for each additional rep."}]},{"title":"Section 13: ELI5 Power Cards — If You Know This, You Pass","cards":[{"q":"ELI5 — Delphi Technique (what it is + the disadvantage they test)","a":"WHAT IT IS (like you're 5):\nImagine you want to guess how many candies are in a jar. Instead of letting a loud kid shout an answer that makes everyone copy him, you give every expert a SECRET piece of paper. They each write a guess. You collect them, show everyone the average ANONYMOUSLY, then everyone writes a NEW guess. You repeat this a few rounds until the guesses settle close together. Nobody knows who said what, so no one dominates.\n\nFORMAL: Delphi Technique = a QUALITATIVE (subjective) forecasting method using SUCCESSIVE ROUNDS of anonymous expert questionnaires. After each round a facilitator shares a summary; experts revise until they reach CONSENSUS. Used when you have no hard data and need expert judgment.\n\nTHE DISADVANTAGE THEY TEST (memorize this):\n• TIME CONSUMING — multiple rounds take a long time to reach consensus. (This is the OA-style \"disadvantage of Delphi\" answer.)\n\nWhy the other choices are WRONG on the OA:\n✗ \"Possibility of a dominating voice\" → that's a disadvantage of GROUP/panel methods, NOT Delphi. Delphi is ANONYMOUS specifically to KILL the dominating voice. Don't fall for this trap.\n✗ \"Argumentative discussion\" → there's no open discussion in Delphi; it's written and anonymous.\n✗ \"Introverts discouraged from participating\" → again, anonymity FIXES this. Delphi protects quiet voices.\n\nONE-LINE MEMORY HOOK: Delphi = anonymous experts, many rounds, downside = SLOW."},{"q":"ELI5 — KAM (Key Account Management)","a":"ELI5: Some customers are your BIG, important friends. You don't treat them like a stranger buying once — you give them a dedicated buddy who looks after them long-term so they keep coming back.\n\nFORMAL: KAM = Key Account Management = developing and maintaining LONG-TERM, sustainable, mutually beneficial relationships with KEY (strategically important) accounts. You isolate the accounts that meet certain criteria of strategic importance and invest internal resources to serve their specific needs.\n\nKAM vs nearby terms:\n• KAM → managing a FEW important existing accounts deeply.\n• ABM (Account-Based Marketing) → concentrating sales + marketing resources on a defined set of target accounts with personalized campaigns.\n• Account Management → maintaining long-term relationships with PAST purchasers in general.\n\nEXAM TELL: \"long-term, mutually beneficial relationship with an important/strategic customer\" = KAM. (Module 2: William maintaining the college relationship = KAM.)"},{"q":"ELI5 — Pareto Principle / 80-20 Rule (Pareto Technique)","a":"ELI5: A small number of things cause MOST of the results. Like 20% of your toys give you 80% of your fun. Most of your money comes from a few of your customers.\n\nFORMAL: Pareto Principle (80/20 Rule, \"law of the vital few\") = roughly 80% of effects come from 20% of causes. In sales: ~20% of your activities (or customers) produce ~80% of your results.\n\nHOW IT'S USED IN SALES:\n• Focus the most effort on the VITAL FEW (the 20% of accounts driving 80% of revenue).\n• Prioritize high-value clients and high-payoff activities.\n\nEXAM TELL: any \"small slice drives the big majority\" / \"focus on the 20% that matters\" = Pareto. Distractor warning — Pareto is NOT a forecasting method and NOT KAM; it's a prioritization principle."},{"q":"ELI5 — Intermediaries (the 4 types)","a":"ELI5: Middlemen — people who help get a product from the maker to you, without being the maker.\n\nFORMAL: Intermediaries = people or businesses that put buyers and sellers together (a.k.a. distribution/marketing intermediaries, middlemen). Channels can be DIRECT (producer → consumer) or INDIRECT (through intermediaries).\n\nTHE 4 CATEGORIES (know who owns the product):\n1. AGENTS or BROKERS — extension of the manufacturer.\n   • Agents: take POSSESSION but NOT ownership.\n   • Brokers: take BOTH ownership and possession.\n2. WHOLESALERS — take TITLE (own) the goods; independently owned; sell in bulk to retailers.\n3. DISTRIBUTORS — take ownership, store it, sell at a profit to retailers; KEY tell = they ALLY to COMPLEMENTARY products / often hold EXCLUSIVE rights (barred from carrying rivals).\n4. RETAILERS — buy from intermediaries and sell directly to the END USER for a profit.\n\nEXAM TELLS:\n• \"Exclusive rights, can't carry rival brands\" → DISTRIBUTOR (Unit 2 Test).\n• \"Sells from a small store at the factory directly to consumers\" → DIRECT channel (PA Q5), no intermediary."},{"q":"ELI5 — Sales Forecasts (and internal vs external forces)","a":"ELI5: A sales forecast is your best GUESS of how much you'll sell next period. To guess well, you look at things INSIDE your company and things OUTSIDE in the world.\n\nFORMAL: Sales Forecast = the process of estimating future sales. It drives staffing, production, and budgets. Forecasting comes BEFORE quotas (you forecast first, THEN assign quotas to salespeople).\n\nINTERNAL FORCES (inside your control):\n• Personnel changes (hiring/losing reps)\n• Product changes (new products, redesigns, customer feedback driving a redesign → PRODUCT factor)\n• Production capacity / financial resources\n• Marketing & promotion plans\n\nEXTERNAL FORCES (outside your control):\n• NEW LAWS / regulations (PA Q36 — forecasting staff for a product division → analyze NEW LAWS)\n• Economy / market conditions\n• Competitors\n• Technology and industry trends\n\nKEY ORDER TO MEMORIZE: Forecast FIRST → THEN set quotas. (PA Q69.)"},{"q":"ELI5 — Types of Interviews (structured / situational / behavioral)","a":"ELI5: Different ways to ask a job candidate questions.\n\nTHE THREE THEY TEST:\n1. STRUCTURED INTERVIEW — EVERY candidate gets the SAME predetermined questions (based on the job analysis, not the person). Fair + comparable. (Module 7: 10 candidates all asked the same questions = structured.)\n2. SITUATIONAL INTERVIEW — asks a HYPOTHETICAL FUTURE scenario: \"How WOULD you handle…?\" / \"How would you construct a comp package?\" (PA Q40). The \"would you\" framing = situational.\n3. BEHAVIORAL INTERVIEW — asks about the PAST: \"Tell me about a time…\" / \"How HAVE you resolved a conflict?\" Past behavior predicts future behavior.\n\nDON'T MIX THESE UP:\n• \"Would you\" = FUTURE = situational.\n• \"Have you / did you\" = PAST = behavioral.\n• \"Same questions for everyone\" = structured (can overlap with either of the above).\n\nAlso know: UNSTRUCTURED interview = casual, different questions per person, less reliable."},{"q":"ELI5 — Segmentation (the 5 types)","a":"ELI5: Splitting a big crowd of customers into smaller groups that are alike, so you can talk to each group the right way.\n\nFORMAL: Market Segmentation = dividing a large homogeneous market into clearly identifiable segments with similar needs/wants/characteristics.\n\nTHE 5 MAIN TYPES (memorize with examples):\n1. GEOGRAPHIC — country, state, zip code (WHERE they are).\n2. DEMOGRAPHIC — age, gender, race, ethnicity, education, income (WHO they are on paper).\n3. CULTURAL — country of origin, language, religion, diet, family structure, social roles.\n4. PSYCHOGRAPHIC — values, opinions, attitudes, lifestyle (HOW they think).\n5. BEHAVIORAL — how they USE products, benefits wanted, how they shop/pay, LOYALTY status (what they DO).\n\nEXAM TELL: Behavioral is the most-tested. \"Didn't send the new-bike email because the customer's bike is only a year old\" = BEHAVIORAL segmentation (Module 4), because it's based on the customer's purchase/usage ACTION.\n\nContrast: UNDIFFERENTIATED (mass) marketing = one message to everyone (e.g., a TV ad during a show most of the population watches, PA Q21)."},{"q":"ELI5 — Salesperson Types (the full roster)","a":"ELI5: Different jobs salespeople can have.\n\nB2B SELLERS:\n• ORDER GETTERS — persuade customers to make a NEW direct purchase (B2B hunters).\n• MISSIONARY — gives info to someone who INFLUENCES a purchase but doesn't buy it themselves (e.g., a rep who gets professors to ADOPT a textbook that STUDENTS buy → PA Q7, Module 2). HUGE on the OA.\n• TRADE — calls on RETAILERS to help them display/advertise/sell to consumers.\n• PROSPECTOR — primary job is FINDING new prospects/leads.\n• TECHNICAL — product EXPERTS who demonstrate how it works and its benefits.\n\nB2C SELLERS:\n• ORDER TAKERS — handle transactions the CUSTOMER starts (B2C).\n• INSIDE SALESPEOPLE — work inside the business taking orders.\n• OUTSIDE SALESPEOPLE — go into the field to meet customers.\n\nEXAM TELL: \"influences the buyer but isn't the buyer\" (textbook reps, pharma reps) = MISSIONARY. \"Finds new leads\" = prospector. \"Expert who demos\" = technical."},{"q":"ELI5 — Strategic Relationship Types (the relationship ladder)","a":"ELI5: How close a buyer and seller are — from one-and-done to married business partners.\n\nTHE LADDER (least → most committed):\n1. TRANSACTIONAL — one-time purchases; each sale is separate; neither side wants an ongoing relationship.\n2. FUNCTIONAL — limited, ongoing repurchase out of HABIT, as long as needs are met (e.g., MRO supplies).\n3. AFFILIATIVE SELLING — buyer NEEDS the seller's EXPERTISE and won't buy without it (trust/knowledge-dependent). (Module 3: Sparkit needs CMS expertise → affiliative.)\n4. STRATEGIC PARTNERSHIP — both sides COMMIT resources (time/money) to grow TOGETHER.\n\nTYPES OF STRATEGIC PARTNERSHIP (sub-list):\n• ALLIANCE AGREEMENT — share resources for competitive advantage.\n• JOINT R&D AGREEMENT — team up to DEVELOP a product (PA Q18: partner to create a NEW product → joint R&D).\n• CO-MARKETING AGREEMENT — share resources to MARKET together (PA Q15: brand products together for summer → co-marketing).\n• MINORITY INVESTMENT — invest in another firm, holding <50% of shares.\n\nEXAM TELLS:\n• \"Needs the seller's expertise to decide\" = affiliative.\n• \"Create a new product together\" = joint R&D.\n• \"Promote/brand together\" = co-marketing."},{"q":"ELI5 — CRM Data (the building blocks)","a":"ELI5: CRM is a giant notebook about your customers. Different pages hold different kinds of info.\n\nKEY CRM DATA CONCEPTS:\n• 360-DEGREE CUSTOMER VIEW — collecting data from ALL touchpoints to fully understand the customer.\n• DATA WAREHOUSE — the big STORAGE bin where all customer data lives (survey data, purchases, etc. → Module 4). Storage ≠ dashboard (which just DISPLAYS).\n• TOUCHPOINTS — any interaction between customer and business (mailer, visit, survey, email…). Count each distinct one.\n\nTWO DATA CATEGORIES (know the difference):\n1. FIT DATA — ATTRIBUTE data about WHO the customer is.\n   • Firmographics — descriptive attributes of FIRMS (industry, size) used to group companies.\n2. BEHAVIORAL DATA — based on what the customer DOES.\n   • Intent — web searches, liking posts.\n   • Engagement — website visits, email opt-ins (Module 5: counting website visits = behavioral).\n   • Relationship — actual interactions with the sales force (meetings, service calls).\n\nOTHER CRM TERMS: Data Mining (find new info in big databases), Data Integrity (accuracy/validity), Lead Scoring (rank prospects by value), Qualified Lead (meets predefined criteria).\n\nEXAM TELL: \"recorded website visits\" = BEHAVIORAL data. \"Where to store survey info\" = DATA WAREHOUSE."},{"q":"ELI5 — Salesperson Incentive Types (every comp tool)","a":"ELI5: All the ways to pay and motivate salespeople.\n\nPAY STRUCTURES:\n• SALARY — fixed, regular pay.\n• COMMISSION — % of sales (variable).\n• SALARY + COMMISSION — both (Module 9: paycheck reflects sale + a guaranteed amount).\n• PIECE-RATE — paid per UNIT sold (PA Q49: hot dogs per unit).\n\nDRAWS (advances against commission):\n• RECOVERABLE DRAW — advance the company EXPECTS to be PAID BACK.\n• NON-RECOVERABLE DRAW — advance the rep KEEPS even if commission falls short (common for new hires; PA Q47: new employees paid $3,000/mo, keep it even if they miss 3 sales → non-recoverable draw).\n\nINCENTIVE PROGRAMS:\n• PERFORMANCE INCENTIVE — bonus for hitting goals (PA Q48: 10% bonus if goals met).\n• SPIF (Sales Performance Incentive Fund) — short-term reward for selling a SPECIFIC item, or to FUND a contest/prize (PA Q51: trip to Hawaii funded by the SPIF; Module 9: bonus for meeting annual objective = SPIF).\n• MERIT PAY — raise tied to performance appraisals.\n• PROFIT / GAIN SHARING — bonus tied to the COMPANY's overall profitability (group benefit).\n• STOCK OPTIONS — buy stock at a fixed price (long-term loyalty).\n• SALES ACCELERATOR — payout grows EXPONENTIALLY once you sell OVER quota.\n\nNON-MONETARY:\n• Awards/recognition (Module 9: Salesperson of the Year award = non-monetary benefit).\n\nEXAM TELLS: \"keeps the money even if short\" = non-recoverable draw. \"Funds a specific contest/prize/item push\" = SPIF. \"Pay per unit\" = piece-rate."},{"q":"ELI5 — Effectiveness of Incentive Programs (good design + the downside)","a":"ELI5: For a reward to actually work, it has to be fair, clear, reachable, and tied to what you want people to do.\n\nGUIDELINES FOR EFFECTIVE INCENTIVES (memorize):\n• Closely TIED TO ACTUAL JOB PERFORMANCE (Module 9 Q5 — the key one).\n• Carefully MONITORED over time.\n• Allow for INDIVIDUAL DIFFERENCES where possible.\n• CONSISTENT with the culture and constraints of the organization.\n• Clearly communicated, understandable, attainable-but-challenging.\n\nTHE DOWNSIDE OF INDIVIDUAL INCENTIVES (tested):\n• INCREASED COMPETITION in targeting clients — reps compete and poach each other's accounts, hurting teamwork (PA Q50). This is the classic \"negative effect of individual incentives.\"\n\nEXAM TELL: \"negative effect of individual incentive systems\" → INCREASED INTERNAL COMPETITION (not lower performance, not less prospecting)."},{"q":"ELI5 — Performance Appraisal TYPES (subjective vs objective + methods)","a":"ELI5: Two ways to grade a salesperson — by the NUMBERS they put up, or by JUDGING how they work.\n\nOBJECTIVE MEASURES (hard numbers):\n• OUTPUTS — results: sales revenue, units (Module 10: assessing sales revenue = output).\n• INPUTS — efforts: calls made, emails sent.\n• RATIOS — relate inputs to outputs (e.g., expense ratio, conversion ratio).\n\nSUBJECTIVE MEASURES (judgment of traits/behaviors):\n• Used when evaluating CHARACTERISTICS that aid selling (PA Q53: evaluating how a salesperson's characteristics helped close = SUBJECTIVE).\n\nAPPRAISAL METHODS (know each):\n• GRAPHIC RATING SCALE — score 1-to-N on several dimensions (Module 10: 1–10 scores = graphic rating scale). Most commonly used.\n• MANAGEMENT BY OBJECTIVES (MBO) — manager + employee set QUANTITATIVE goals together, then measure attainment (PA Q54, Q56).\n• BEHAVIORALLY ANCHORED RATING SCALE (BARS) — ratings anchored to specific behaviors.\n• CRITICAL INCIDENT TECHNIQUE — log specific good/bad events.\n• EMPLOYEE COMPARISON — rank employees against each other.\n• 360-DEGREE FEEDBACK — gather input from peers, subordinates, customers (Module 10: feedback from colleagues = all-perspectives/360).\n\nCUSTOMER FEEDBACK METHODS: Account visit (1-on-1 in person), Focus group (several customers together), Survey/questionnaire.\n\nEXAM TELLS: \"1-to-10 on several dimensions\" = graphic rating scale. \"Manager + employee set goals together\" = MBO. \"Grading traits/characteristics\" = subjective."},{"q":"ELI5 — Performance Appraisal ERRORS + GROUPTHINK (your #1 gap)","a":"ELI5: Mistakes a boss makes when grading people — usually being unfair without meaning to.\n\nTHE APPRAISAL ERRORS (memorize the whole set):\n• HALO EFFECT — ONE GOOD trait makes the boss rate EVERYTHING high. (\"She's great at closing, so I'll rate her high on everything.\")\n• HORN EFFECT — ONE BAD trait drags EVERYTHING down. (The opposite of halo.)\n• LENIENCY ERROR — rating EVERYONE too HIGH/positive (too soft).\n• STRICTNESS ERROR — rating everyone too LO
