<script>
const MODULES=[{"title":"Module 1: Sales Role","cards":[{"q":"Q1: Discuss the 4 key objectives of a sales department, giving an example for each.","a":"Main role of sales: Generate revenue by creating and maintaining a solid customer base.\n\n1. Generate Customers and Convert Sales — Done efficiently and inexpensively. Efficient depts always work to improve conversion rates.\n   Example: Running targeted email campaigns to convert leads into buyers.\n\n2. Retain Current Customers — Costs more to gain new clients than retain. Salespeople must adapt the process to each customer.\n   Example: Loyalty programs and account managers checking in with existing clients.\n\n3. Develop a Sales Forecast — Determine how much can be sold during a period and at what price. Helps manage workforce, production, financial resources.\n   Example: Forecasting Q4 holiday demand to plan inventory.\n\n4. Ensure Product-Market Fit — Sales works closely with marketing so the product meets target market needs and is promoted correctly.\n   Example: Gathering customer feedback on a new feature and adjusting the offering."},{"q":"Q2: What are the two common corporate structures? Explain with an example.","a":"1. Functional Organizational Structure — Adopted as sales increase. Groups employees into functional areas based on expertise. Areas often correspond to stages in the value chain.\nExample: CEO over departments — Human Resources, Finance & Accounting, Sales & Marketing, Research & Development, Operations.\n\n2. Modular Corporate Structure with SBUs — Divides business into small, tightly-knit Strategic Business Units focused on specific elements of the organizational process.\nExample: CEO over Division X and Division Y, each with its own Production, Sales/Marketing, Finance, and R&D."},{"q":"Q3: What are Strategic Business Units? Explain with an example.","a":"Strategic Business Unit (SBU) — A profit center that focuses on a specific product offering and market segment. SBUs operate semi-independently within a larger company, each with its own strategy and resources.\n\nExample: A consumer goods conglomerate may have one SBU focused on personal care products and another focused on packaged foods. Each has its own production, sales/marketing, finance, and R&D functions reporting up to the CEO."},{"q":"Q4: What is Competitive Advantage and Sustainable Competitive Advantage?","a":"Competitive Advantage — A condition or circumstance that puts a company in a favorable or superior business position vs. competitors.\n\nSustainable Competitive Advantage — Company assets, attributes, or abilities that are difficult to duplicate or exceed and provide a superior or favorable LONG-TERM position over competitors.\n• Supports HOW a company competes, NOT what it does to compete.\n• Long-term, durable, hard to copy."},{"q":"Q5: Identify the factors that can help companies develop a sustainable competitive advantage.","a":"1. Customer Loyalty (loyalty cards, brand trust)\n2. Location\n3. Distribution and Information Systems\n4. Unique Merchandise\n5. Vendor Relations\n6. Customer Service\n7. Multiple Source Advantage"},{"q":"Q6: Define Customer Relationship Management (CRM)? Identify and describe a few goals of CRM.","a":"CRM — Processes implemented by a company to handle its contact with customers, with the goal of creating a unified customer experience to maximize retention. Captures and maintains info about prospective and current customers.\n\nGoals of CRM:\n• Capture new leads and move them through the sales process\n• Support and manage relationships with current customers to maximize lifetime value\n• Boost productivity and lower overall costs of marketing, sales, and account management\n• Identify customer segments\n• Improve customer retention\n• Improve product offerings\n• Improve the customer experience\n• Identify the most profitable customers"},{"q":"Q7: What is Business Intelligence? What are some ways a business can use BI to improve performance?","a":"Business Intelligence (BI) — The use of data in an enterprise to facilitate decision-making. Includes understanding actual operations and anticipating future events to provide knowledge supporting business decisions.\n\nUses of BI:\n• Analyze sales trends to forecast more accurately\n• Identify which customers/products generate the most profit\n• Spot inefficiencies in the sales process\n• Benchmark performance against competitors\n• Use Big Data Analytics on large/complex data sets to predict trends\n• Inform strategic decisions about pricing, product mix, and channels"},{"q":"Q8: Briefly outline the major timelines or key phases in the evolution of sales practices and strategies.","a":"Evolution of sales practices:\n\n• Pre-Industrial — Focus on local, transactional selling.\n• Production Era (early 1900s) — Mass production, push selling.\n• Sales Era (1920s–1950s) — Aggressive transactional selling, \"always be closing.\"\n• Marketing Era (1950s–1990s) — Customer-needs orientation, marketing concept emerged.\n• Relationship Era (1990s–2000s) — Long-term relationships, CRM systems introduced.\n• Digital/Social Era (2000s–today) — Big data, analytics, social selling, AI-driven personalization, omnichannel buyer journey."},{"q":"Q9: What is the Code of Ethics?","a":"Code of Ethics — A document that outlines:\n• The mission and values of the business or organization\n• How professionals are supposed to approach problems\n• The ethical principles based on the organization's core values\n• The standards to which the professional is held\n\nRelated concepts:\n• Uniform Commercial Code (UCC) — Comprehensive laws governing commercial transactions in the U.S.\n• American Marketing Association (AMA) Code of Conduct/Ethics — Standard of professional ethical norms for AMA members."},{"q":"Q10: What are the four elements that make up ethical behavior within an organization? Provide 5 examples of ethical concerns related to sales.","a":"4 Elements for Ethical Behavior:\n1. Written Code of Ethics and Standards\n2. Ethics Training to Executives, Managers, and Employees\n3. Availability of Advice on Ethical Situations\n4. A System for Confidential Reporting\n\n5 Sales-Related Ethical Concerns:\n1. Misrepresenting product capabilities to close a sale\n2. High-pressure tactics that exploit vulnerable customers\n3. Bribery or kickbacks to win contracts\n4. Padding expense reports\n5. Sharing confidential customer/competitor information"},{"q":"Q11: What is the relationship between sales and marketing?","a":"• Share the same goal of moving prospective customers through the purchasing process successfully.\n• Sales is a SUBSET of Marketing.\n• Marketing ATTRACTS prospective customers; Sales CONVERTS the prospects into paying customers.\n\nMarketing: Uses 4 Ps (product, place, promotion, price), promotional mix, builds ongoing brand relationships, motivates customers to act, gives feedback to sales.\n\nSales: Identifies which customers to engage, interacts one-on-one to identify needs, converts interested customers into purchasers, builds personal relationships, IS the brand in the eyes of the customer, gives feedback to marketing."},{"q":"Q12: What are Exchanges in Marketing?","a":"Exchanges — The process where two parties give something of value to each other to satisfy their respective needs.\n\n• Exchanges are the foundation of marketing.\n• Both parties must perceive that they receive value greater than what they give up.\n• Inputs (resources invested: time, money, effort) result in Outputs (the produced/delivered good or service).\n• Marketing Concept: Identifying consumer needs and producing goods/services to satisfy them while making a profit.\n• \"Right\" Principle: Right goods to the right people at the right place, time, and price using the right promotional techniques."},{"q":"Q13: What are different forms of Promotional mix?","a":"Promotional Mix — Combination of:\n1. Advertising — Paid, mass, non-personal communication.\n2. Personal Selling — Person-to-person interaction to sell products/services.\n3. Sales Promotion — Short-term incentives (coupons, contests, samples).\n4. Public Relations — Building goodwill via media, sponsorships, events.\n\n(Modern lists also add: Direct Marketing, Interactive/Digital Marketing, Social Media.)"},{"q":"Q14: What is Integrated Marketing Communication?","a":"Integrated Marketing Communications (IMC) — Careful coordination of ALL promotional activities (traditional advertising, sales promotion, personal selling, PR, social media, digital advertising, packaging, direct marketing) to produce a CONSISTENT, UNIFIED message that is customer focused.\n\nPA EXAMPLE: A retailer launching a new product line uses social media advertising + print promotional pieces + online promotions + a special launch event. That coordinated multi-channel campaign = IMC."},{"q":"Q15: Identify all advantages of Personal selling.","a":"Personal Selling — Salespeople presenting the business's products through face-to-face interaction; the customer believes the salesperson represents the company.\n\nAdvantages:\n• Provides a detailed explanation or demonstration of the product\n• Sales message can be VARIED according to motivations of each prospective customer\n• Can be directed only to QUALIFIED prospects\n• Costs can be controlled by adjusting sales force size in one-person increments\n• MORE EFFECTIVE than other forms of promotion at obtaining a sale and gaining a satisfied customer"},{"q":"Q16: Describe the buyer's journey?","a":"Buyer/Customer Journey — Framework acknowledging a buyer's progression through research and decision-making toward a purchase.\n\nAIDA Model:\nA — Attention: Buyer becomes aware of the product.\nI — Interest: Buyer learns more, evaluates fit.\nD — Desire: Buyer wants the product, weighs alternatives.\nA — Action: Buyer purchases.\n\nSales Funnel Equivalent:\nTop of Funnel (TOFU/Marketing) → Leads → Attention\nMiddle of Funnel (MOFU/Sales) → Suspects (Interest) and Prospects (Desire)\nBottom of Funnel (BOFU/Marketing) → Customer (Action)"},{"q":"Q17: Identify differences between Transactional and Relationship selling?","a":"Transactional Selling\n• Focuses on short-term, often single transactions\n• Process: Prospect → Offer Product → Close\n• Quick, no long-term focus\n• Less useful to a business than relationship selling\n\nRelationship Selling\n• Long-term relationship building to keep customers satisfied so they return for multiple purchases\n• Based on Authenticity, Genuine Concern, Honesty\n• Goal: Know a large enough pool of people that all the sales come to you\n• Salesperson must be patient, care about customer's problems, believe in the product\n• Increasing Customer Retention by 5% increases Profits 25–95%\n\nPA EXAMPLE: A salesperson establishing ongoing communication to ensure current AND future sales = RELATIONSHIP selling."},{"q":"Q18: How does the Social Style Matrix help with Adaptive selling? What are the four social styles? Identify key characteristics of each.","a":"Adaptive Selling — Customizes the sales encounter to the customer to improve experience and satisfaction. Adapting demonstrates the LAW OF PSYCHOLOGICAL RECIPROCITY (when you adapt to someone's style, they move toward yours).\n\nSocial Style Matrix — X-axis: Assertiveness. Y-axis: Responsiveness.\n\nANALYTICALS (Low Responsiveness, Low Assertiveness) — want to know \"HOW\"\n• Focus on facts, pros/cons, history, data, financials\n• Don't challenge their facts; demonstrate results; mention guarantees; give time to decide\n\nDRIVERS (Low Responsiveness, High Assertiveness) — want to know \"WHAT\"\n• Get to point quickly; provide options; use facts; focus on results; provide timelines; make them feel in control\n\nAMIABLES (High Responsiveness, Low Assertiveness) — want to know \"WHY\"\n• Establish personal relationships; demonstrate personal commitment; work as a team\n\nEXPRESSIVES (High Responsiveness, High Assertiveness) — want to know \"WHO\"\n• Take time discussing; give recognition/approval; ask how they feel; focus on big picture; use facts/figures to show what's possible"},{"q":"Q19: What is the Law of Psychological Reciprocity?","a":"Law of Psychological Reciprocity — When you adapt to someone's style, that person will move toward your style. Also: when someone does something nice for you, you have a deep-rooted urge to do something nice in return.\n\nWhy it matters: Demonstrated by Adaptive Selling. Builds rapport and improves likelihood of a successful sale."},{"q":"Q20: What is Consultative selling?","a":"Consultative Selling — Sales approach where the seller becomes a TRUSTED ADVISOR to the customer and builds a relationship to truly understand the customer's needs.\n\n• Seller acts more like a consultant than a vendor\n• Focus is on diagnosing the customer's problem and recommending solutions\n• Often produces higher-value, longer-lasting deals\n• Key in B2B selling and complex sales"},{"q":"Q21: Define Customer Lifetime Value (CLV)? How is CLV calculated?","a":"Customer Lifetime Value (CLV) — Current value of all future business from a customer throughout the customer's relationship with the organization. A prediction of net profit attributed to the entire future relationship.\n\nFormula:\nCLV = $ Value of Purchase × Gross Profit Percent × Number of Purchases\n\nValue Proposition (related): Should be Clear, Compelling, Differentiating — Who? What? Why?\n• Who? Show clear value to the target buyer.\n• What? Define the offering in the buyer's context.\n• Why? Show why the offering is uniquely valuable.\n\nValue = Benefit − Cost"},{"q":"Q22: When a Business sells at no loss/no profit (e.g., $20 cost, sells for $20), what is the Return on Investment?","a":"ROI Formula: ROI = (Net Profit ÷ Investment) × 100\n\nIf cost = $20 and sale price = $20:\nNet Profit = $20 − $20 = $0\nROI = ($0 ÷ $20) × 100 = 0%\n\nReturn on Investment is 0% — the company breaks even.\n\nRelated concept: Return on Customer Investment — Analyzing all customer-centric investments (time, effort, money on relationships) to decide whether expenses provide profitable return."}]},{"title":"Module 2: Sales Practice","cards":[{"q":"Q1: Identify 5 points of differences between B2B and B2C markets.","a":"Business-to-Business (B2B):\n• Relatively few potential customers\n• Larger purchases (for production or resale)\n• Longer selling cycle\n• Multiple influencers and decision makers\n• More difficult to identify influencers/decision makers\n• Focused on RELATIONSHIP BUILDING\n• More RATIONAL decision-making, more concerned with risk\n\nBusiness-to-Consumer (B2C):\n• Many customers\n• Relatively small purchases (personal/family/friends)\n• Short selling cycle\n• Fewer influencers and decision makers\n• Easy to identify influencers/decision makers\n• Seeks to maximize TRANSACTION VALUE\n• More EMOTIONAL decision-making, less concerned with risk"},{"q":"Q2: What are the different sales channels used by companies & what are the different types of distribution channels?","a":"Sales Channels — The way products/services reach consumers.\n\n1. Company-Direct (Level Zero) — Producer sells directly to consumer.\n   PA EXAMPLE: A small company makes hood ornaments and sells them in a small store at one end of the factory = DIRECT channel.\n\n2. Indirect (uses intermediaries):\n   • Retail Channel: Producer → Retailer → Consumer\n   • Wholesale Channel: Producer → Wholesaler/Distributor → Retailer → Consumer\n   • Agent Channel: Producer → Agent/Broker → Wholesaler/Distributor → Retailer → Consumer"},{"q":"Q3: Who are intermediaries in a sales or distribution process, and what are the main categories?","a":"Intermediaries — People or businesses that put buyers and sellers together without taking ownership of the product/service/property. (Also called distribution intermediaries, marketing intermediaries, or middlemen.)\n\nCategories:\n1. Agents/Brokers — Act as an extension of the manufacturing company.\n   • Agents: Don't own the product but take possession during distribution. Profit via fees/commissions.\n   • Brokers: Take BOTH ownership AND possession.\n\n2. Wholesalers — Take title to goods. Independently owned. Buy in bulk; rarely sell to end user. Profit by reselling at higher price to other intermediaries.\n\n3. Distributors — Similar to wholesalers but ally with COMPLEMENTARY products to maintain closer relationships with suppliers (e.g., Coke distributors don't distribute Pepsi).\n\n4. Retailers — Purchase from intermediaries and sell directly to end users for profit."},{"q":"Q4: What are different ways to categorize salespeople?","a":"Two main categories:\n\n1. Order Getters — Persuade customers to make a direct purchase. Common in B2B.\n\n2. Order Takers — Handle transactions initiated by the customer. Common in B2C.\n\nOther splits:\n• Inside Salespeople — Work inside the business taking orders/transactions (incl. customer service reps).\n• Outside Salespeople — Go out into the field to meet customers."},{"q":"Q5: What are the various types of B2B sales roles that fall under the category of order getters?","a":"Order Getters — Persuade customers to buy.\n\n1. Missionary Salespeople — Provide information to influencers of purchase decisions. Build awareness and goodwill.\n   PA EXAMPLE: A textbook company salesperson visits each professor to show what the company offers, hoping the professor adopts the book = MISSIONARY salesperson.\n\n2. Trade Salespeople — Call on retailers; help them display, advertise, and sell products to consumers.\n\n3. Prospectors — Primary function is to find prospects (potential customers). Often involves cold calling.\n\n4. Technical Salespeople — Experts in specific products/services. Promote and sell by demonstrating function and benefits."},{"q":"Q6: What are the various types of B2B sales roles that fall under the category of order takers?","a":"Order Takers — Handle customer-initiated transactions.\n\n• Inside Order Takers — Work in the office, take orders by phone/email/online.\n• Outside/Route Order Takers — Visit customers on routes to handle restocking and reorders.\n• Customer Service Representatives — Handle inquiries, questions, complaints, and general info; can take orders or upsell during interactions.\n\nTheir job is execution and continuity, not persuasion."},{"q":"Q7: What is Key Account Management (KAM)? How does Pareto principle apply to KAM?","a":"Key Account Management (KAM) — Process of distinguishing a portfolio of accounts based on criteria of strategic importance to the company's long-term success.\n\n• Identifies key accounts and invests internal resources to deliver tailored services.\n• Focuses on long-term, mutually beneficial relationships with the most important customers.\n\nPareto Principle (80/20 Rule) — 80% of effects come from 20% of causes.\nApplied to KAM: Roughly 80% of sales come from 20% of customers — so prioritize and protect those high-value accounts."},{"q":"Q8: How are Inactive accounts different from Passive accounts?","a":"Inactive Accounts — Clients who made a one-time purchase and have NOT made a purchase for a specified period (period varies by business).\n\nPassive Accounts — Clients who have an ongoing relationship with the company, often through the website. May or may not have a recurring order. NO contact with outside sales but DO have some contact with customer service. Bring in revenue without active sales engagement.\n\nActive Accounts — Clients with frequent orders, large orders, or both."},{"q":"Q9: Identify the difference between power skills and hard skills of salespeople.","a":"Power Skills (Soft Skills) — Non-quantifiable, personal habits developed over time that affect interactions with others. Personal attributes for effective interpersonal interaction.\n• Empathy\n• Verbal Communication (incl. Responsive Listening)\n• Conflict Resolution\n• Analytical Decision-Making\n\nHard Skills — Easily quantifiable, teachable abilities. Learned through training/books/on the job.\n• Product Knowledge\n• Writing Proposals and Contracts\n• Technology Proficiency\n• Software Skills"},{"q":"Q10: What are four essential skills needed for any salesperson to do the job well?","a":"1. Ability to Build Rapport — Establishing trust and connection quickly.\n2. Time Management — Prioritizing high-value activities and managing the sales cycle efficiently.\n3. Ability to Conduct Research — Knowing the prospect, market, competition, and product.\n4. Critical Thinking and Problem Solving — Diagnosing customer needs and crafting solutions.\n\nBonus: Strategic Thinking — Process applied to achieving a goal/set of goals in an endeavor."},{"q":"Q11: What are the three essential skills managers must possess when managing their sales team?","a":"1. Coaching — Developing salespeople through feedback, training, and skill-building.\n2. Performance Management — Setting expectations, measuring results, holding accountable, addressing gaps.\n3. Leadership — Inspiring, motivating, and providing direction so the team executes the strategy."},{"q":"Q12: Identify the six steps in the sales process. Give at least two characteristics in each.","a":"1. Prospecting and Qualifying\n   • Prospecting: Research to ID people/companies who might be interested.\n   • Qualifying: Determine if the prospect has DESIRE and ABILITY to buy.\n\n2. Approach\n   • Introductions, casual conversation, preliminary questions.\n   • Goal: Set an appointment with a specific date/time.\n\n3. Presenting and Demonstrating\n   • Show how the product meets customer needs.\n   • Tailor the presentation to the customer.\n\n4. Handling Objections\n   • Overcome customer hesitations or concerns.\n   • Reframe price/feature/timing objections with benefits.\n\n5. Closing the Sale\n   • Ask for the order; finalize terms.\n   • Confirm the customer's commitment.\n\n6. Following Up on the Sale\n   • Ensures customer satisfaction; helps secure additional sales, referrals, positive reviews.\n   • Includes signing contracts, setting delivery/install dates, creating timelines.\n\nPA EXAMPLE: Conducting follow-up on a sale ENSURES CUSTOMER SATISFACTION."},{"q":"Q13: What are the different phases in the sales funnel?","a":"Sales Funnel Phases:\n\n1. Leads — Potential buyers who have shown initial interest (entered top of funnel).\n2. Suspects — Leads who appear to fit but haven't been qualified.\n3. Prospects — Qualified leads with the desire and ability to buy.\n4. Customers — Those who completed a purchase.\n\nMapped to AIDA: Leads = Attention, Suspects = Interest, Prospects = Desire, Customers = Action."},{"q":"Q14: Identify characteristics of TOFU, MOFU, BOFU.","a":"Top of the Funnel (TOFU) — Marketing\n• Generates Leads (Attention stage)\n• Broad reach via advertising, content, social media\n• Goal: Awareness\n\nMiddle of the Funnel (MOFU) — Sales\n• Suspects (Interest) and Prospects (Desire) engage with the company's products\n• Personalized, consultative interaction\n• Goal: Qualify and convince\n\nBottom of the Funnel (BOFU) — Marketing\n• Customers (Action stage)\n• Closing tools, retention campaigns, onboarding\n• Goal: Convert and retain"}]},{"title":"Module 3: Organizational Buying Process","cards":[{"q":"Q1: What are buying centers? What are selling centers? How are they different?","a":"Buying Center / Decision-Making Unit (DMU) — A group of people within an organization who make business purchasing decisions. Can be informal/ad hoc or formal with specific mandates and procedures. Members vary based on what's being purchased.\n\nSelling Center — Team-selling approach where functional representation (finance, marketing, operations, etc.) joins the salesperson to support the selling process. Functional reps brought in as needed to mirror and serve the buying center.\n\nDifference:\n• Buying Center = on the BUYER side; decides what to purchase.\n• Selling Center = on the SELLER side; coordinates expertise to win the sale.\n• Selling centers are designed to engage with buying centers in a common language."},{"q":"Q2. What are the possible roles in a buying center in a high-tech sector?","a":"Three primary buyer types in a high-tech buying center:\n\n1. Economic Buyer — Responsible for buying products that enable the company to achieve a business advantage. Justifies purchase by linking it to profit. Position can range from Business Unit Manager to CEO.\n\n2. Infrastructure Buyer — Influences buying decision at the EXECUTION level. If a product poses install challenges, decides whether ROI justifies setup time/money. Typically someone in IT.\n\n3. User Buyer — Influences buying decision at the USER level. Decides whether the org will achieve its financial objectives through the purchase based on actual use."},{"q":"Q3: Identify all the stakeholders in the buying process. Identify each with their unique characteristics.","a":"1. Initiators — First see the need for the product and start the process. May or may not have authority to make the final decision.\n\n2. Users — Actually use the product. Often serve as initiators. Involved in input, demos, testing.\n\n3. Influencers — May or may not use the product but have experience or expertise that improves the buying decision.\n\n4. Gatekeepers — Decide if and when you get access to members of the buying center. Must be courted as hard as buyers.\n   PA EXAMPLE: A school administrator who takes a salesperson's contact info and says the principal may reach out = GATEKEEPER.\n\n5. Decision Makers — Make the final purchasing decision.\n\n6. Buyers — Sign the contract. Provide info about industry trends, organizational initiatives, and risks."},{"q":"Q4: What are some of the differences between B2B and B2C buyers?","a":"B2B Buyers (Organizational):\n• Shrewd, well informed\n• Less likely to buy on a whim\n• Roles: Purchasing Managers, Procurement Officers, Merchandisers\n• Drive RATIONAL decisions; risk-conscious\n• Multiple decision-makers, longer cycle\n\nB2C Buyers:\n• Buy for personal/household use\n• More EMOTIONAL decisions\n• Less risk-concerned\n• Single or few decision-makers\n• Short cycle\n\nRoles in B2B buying:\n• Purchasing Manager — Buys/approves acquisitions for the company.\n• Procurement Officer — Manages, administers, supervises acquisition programs.\n• Merchandiser — Buys goods for retail and displays them in store."},{"q":"Q5: What are the stages in the organizational buying decision process? Identify key characteristics of each.","a":"7 Stages of the Organizational Buying Process:\n\n1. Recognize the Need — Someone realizes a need exists. Users often initiate.\n2. Define the Need — Stakeholders create product specifications. Involves users and initiators.\n3. Search for Suppliers — Buyers look online, attend trade shows, contact existing/approved suppliers. Best way: referrals. Usually involves purchasing agents.\n4. Bid Analysis — Buyer sends a Request for Proposal (RFP) to multiple vendors. Each vendor provides a detailed proposal.\n   PA EXAMPLE: A manufacturer wants suppliers to bid on price/quality/after-sales = uses an RFP.\n5. Supplier Selection — RFPs reviewed; vendor(s) chosen. Negotiations on price/terms.\n   PA EXAMPLE: A company received RFP responses; decision makers meet to review = SUPPLIER SELECTION stage.\n6. Order Placement — Order with agreed price, quantities, delivery, returns, warranties. Can be electronic, one-time, or recurring.\n7. Performance Review — Buyer surveys users for quality and satisfaction. Not all poor performance is the vendor's fault."},{"q":"Q6. What are single-sourced suppliers? Benefits and drawbacks?","a":"Single-Sourced Supplier — Use of ONE supplier for 100% of a firm's products and services even when alternatives are available.\n\nBenefits:\n• Better pricing through volume negotiation\n• Consistent quality\n• Stronger supplier relationship\n\nDrawbacks:\n• Reliance and dependence on one supplier\n• Power shifts to the supplier\n• Risk if supplier has supply-chain or quality issues"},{"q":"Q7: Difference between Straight Rebuy, New-Task Purchase, and Modified Rebuy?","a":"Straight Rebuy — Purchaser buys the SAME product in the SAME quantities from the SAME vendor under the same terms. Post-purchase evaluations often skipped. Typical for consumables/supplies. Reliable revenue stream.\n\nNew-Task Purchase — Firm purchases a product for the FIRST time. Most time-consuming for both buyer and seller.\nPA EXAMPLE: Company expands internationally and needs CUSTOMIZED factory equipment for a new facility — that's a NEW TASK PURCHASE.\n\nModified Rebuy — Company wants to buy the same TYPE of product as before but with some modifications."},{"q":"Q8: What are the three types of customers in the B2B market? Key characteristics?","a":"1. Producers — Buy products to make/build their own product or service to sell for profit.\n   Example: Reebok buys parts/materials to make shoes.\n   PA EXAMPLE: A company that buys raw materials to manufacture tire pressure sensors then sells to auto companies = PRODUCER.\n\n2. Resellers — Purchase finished goods to sell, lease, or rent to B2B or B2C purchasers.\n   Example: Foot Locker buys finished products from Nike/Reebok/UA. (B2B as a reseller; B2C when selling to consumers.)\n\n3. Organizations — Government bodies and nonprofit groups. Some nonprofits act as producers (soup kitchens) or resellers (LIVESTRONG bands)."},{"q":"Q9: What are Value-Added Resellers (VARS)? Give an example.","a":"Value-Added Reseller (VAR) — A reseller that adds features or services to an existing product and sells it.\n\n• Common in IT industries.\n• Example: A reseller sells a software package and adds its own training/integration/support to go with it."},{"q":"Q10: What are B2G markets?","a":"B2G (Business-to-Government) Markets — When companies sell to local, state, and federal governments.\n\n• U.S. government is the largest purchaser of goods/services in the world.\n• Major opportunity even for small sellers.\n• Many gov't entities require contracts with small businesses, minority/women-owned, disabled-vet-owned firms.\n• Sellers must register with the Central Contractor Registry, then consult the General Services Administration (GSA).\n• No central department; many federal agencies can purchase up to $25,000 at a time.\n\nFive Categories of Government Purchasing:\n1. Micro-purchases with credit cards (under $10,000) — 70% of all gov't purchases.\n2. Simplified Acquisition Procedures (under $250,000).\n3. Sealed Bids — Use Invitation for Bid (IFB) for specific requirements.\n4. Contracting by Negotiation — RFP for highly technical products/services exceeding $150,000.\n   PA EXAMPLE: Government issues an RFP for military software development expected to exceed $1M with technical collaboration = CONTRACTING BY NEGOTIATION.\n5. Consolidated Purchasing Vehicles — Centralized everyday purchases (e.g., GSA schedules, GWACs).\n\nPrime Contractors hold government contracts directly; Subcontractors work under another company that holds the direct contract."},{"q":"Q11: What are three types of complexities that make B2B purchasing decisions more challenging?","a":"1. Timing Complexity — Coordinating purchase, production, and delivery schedules across the buyer's operations. Delays can shut down production lines.\n\n2. Technical Complexity — Products often have technical specifications, customization, and integration requirements that demand expert input from the buying center (e.g., infrastructure buyers in IT).\n\n3. Organizational Complexity — Multiple stakeholders/decision makers (initiators, users, influencers, gatekeepers, deciders, buyers) each with different priorities, criteria, and authority. Building consensus takes time.\n\n(Government and regulatory environments add a 4th layer of complexity in B2G.)"},{"q":"Q12: What are the factors that influence B2B buying behavior?","a":"Factors Influencing B2B Buying:\n\n1. Individual Factors — Personal goals, experience, risk tolerance, motivations of decision makers.\n2. Organizational Factors — Company strategy, policies, structure, culture, budget.\n3. Business Environment — Economic conditions, technology, market trends, competition.\n4. Government and Regulatory Environment — Laws, compliance requirements, trade regulations.\n\n(Opinion Leaders — Influential members of a community/industry whose views shape buying decisions.)"},{"q":"Q13: What are the four forms of sales relationships within organizational buying?","a":"1. Transactional Relationships — Each sale is a separate exchange; little/no interest in ongoing relationship. (One-time purchases.)\n\n2. Functional Relationships — Limited, ongoing relationships when a buyer continues purchasing out of habit as long as needs are met. Common with MRO (Maintenance, Repair, Operations) supplies.\n\n3. Affiliative Selling Relationships — Buyer needs significant expertise from the seller and trusts seller to use best judgment. Buyer unlikely to purchase without seller's input.\n\n4. Strategic Partnerships — Both parties commit time and money to expand \"the pie\" for both. Often likened to a marriage. Risks/rewards shared."},{"q":"Q14: What are the types of strategic Partnerships? Give examples.","a":"1. Alliance Agreements — Formal agreement among companies to share resources to create competitive advantage. Companies remain independent.\n\n2. Joint R&D Agreements — Two or more businesses join to develop a specific product or service.\n   Example: NASA and Google joined to create Google Earth.\n   PA EXAMPLE: A business owner and manufacturer partner to create a new product for an industry they both serve = JOINT R&D AGREEMENT.\n\n3. Co-Marketing Agreements — Specifies how two firms exchange materials, tools, training to market each other's services/products.\n\n4. Minority Investments — Non-controlling share (under 50%) held by another organization or investor."},{"q":"Q15: Identify the form of relationship for each scenario.","a":"A. Printing paper → TRANSACTIONAL (commodity, one-off purchases)\n\nB. Suppliers selling parts to Boeing for the Dreamliner → STRATEGIC PARTNERSHIP (deep integration, shared risk)\n\nC. Company selling fraud detection software to a mid-sized Bank → AFFILIATIVE (bank needs expertise/trust)\n\nD. Going to a personal trainer because you trust their advice → AFFILIATIVE\n\nE. Business orders printer ink regularly from same reliable supplier → FUNCTIONAL (habitual, ongoing, needs met)\n\nF. Small company works closely with IT consultant on cybersecurity → AFFILIATIVE (relies on consultant's expertise)"}]},{"title":"Module 4: Customer Relationship Management","cards":[{"q":"Q1: Briefly describe the key functions of Customer Relationship Management (CRM) systems.","a":"CRM — Processes implemented by a company to handle contact with customers to create a unified customer experience and maximize retention.\n\nKey functions:\n• Capture new leads and move them through the sales process\n• Support and manage relationships with current customers to maximize lifetime value\n• Boost productivity and lower the costs of marketing, sales, and account management\n• Centralize sales and customer data\n• Automate selling administrative tasks\n• Provide reporting and analytics for decision-making"},{"q":"Q2: List and describe the four business goals of CRM systems.","a":"1. Centralize Sales Data for Operational Efficiency — One source of truth for customer info accessible across teams.\n\n2. Automate Selling Administrative Tasks — Boost productivity; lower marketing/sales/account management costs.\n\n3. Capture New Leads and Move Them Through the Sales Process — Track every prospect from first touch to close.\n\n4. Support and Manage Current Customer Relationships — Maximize lifetime value through retention activities."},{"q":"Q3: Briefly describe the three objectives of CRM systems.","a":"1. Customer Acquisition — Process of gaining new customers by persuading them to purchase products/services.\n\n2. Customer Retention — Ability of a company/product to retain its customers over a specified period.\n\n3. Customer Profitability — Maximize revenue and minimize costs per customer over the customer's lifetime."},{"q":"Q4: Describe the operational, analytical, and collaborative functions of CRM systems.","a":"Operational CRM — Primary activities resulting in actual interactions with customers. Integrates sales, marketing, and customer support to ensure satisfaction. Focuses on AUTOMATION (e.g., follow-up email to a customer who left a cart).\n\nAnalytical CRM — Helps understand, predict, scale, and optimize customer interactions to strengthen relationships. Reviews patterns/data to guide strategy.\n\nCollaborative CRM — Involves many parties (customer, finance, sales, service, external vendors). Goal: provide greater benefit for the customer through coordinated effort."},{"q":"Q5: Briefly describe the four phases of the CRM process cycle. Identify the phase for each scenario.","a":"Phases:\n1. Knowledge Discovery — Extract market info from all customer segments and sources (distribution, shipping, online).\n2. Market Planning — Develop strategies and processes directed by knowledge discovery. Defines customer relationship types.\n3. Customer Interaction — Occurs at customer touchpoints. Each touchpoint is an opportunity to collect info.\n4. Analysis and Refinement — Review results and improve.\n\nScenarios:\na. CRM analyzes whether sales improved after a campaign and identifies feedback gaps → ANALYSIS AND REFINEMENT\nb. Customer emails support; team responds and updates CRM → CUSTOMER INTERACTION\nc. Company launches new digital ad campaign for younger customers → MARKET PLANNING\nd. Marketing collects data from surveys, online behavior, shipping records → KNOWLEDGE DISCOVERY"},{"q":"Q6: Explain re-engineering, data mining, integrating data, and customer-centric approach as outcomes of continual CRM improvement.","a":"Re-engineering Processes — Recreating a core business process to improve product output, quality, or reduce costs.\n\nData Mining — Examining large databases to generate new information and identify patterns.\n\nIntegrating Data — Combining data from disparate sources into meaningful, valuable information for decision making.\n\nCustomer-Centric Approach — Aligning all functions and processes around the customer's needs, with shared rewards and risks across the organization."},{"q":"Q7: Explain how data warehousing, data mining, and data integrity relate to CRM.","a":"Data Warehouse — Large store of data accumulated from a wide range of internal sources used to guide management decisions.\n\nData Warehousing — Electronic storage of large amounts of organizational information.\n\nData Mining — Practice of examining large databases to discover patterns and generate insights.\n\nData Integrity — Accuracy and validity of data.\n\nTogether: A CRM relies on a data warehouse to store info, mining to extract insights, and integrity to ensure those insights are trustworthy."},{"q":"Q8: Explain the data security concerns related to CRM systems.","a":"Threats:\n• Data Breaches — Intentional/unintentional release of confidential information.\n• Viruses — Code that copies itself and corrupts/destroys data.\n• Worms — Malicious software that infects other computers while remaining active.\n• Trojan Horses — Spy on the victim's computer to access files or extract sensitive data.\n• Cybercrime — Criminal activities via computers/internet.\n\nMitigation: Encryption, access controls, employee training, regular audits, secure backups."},{"q":"Q9: Explain each of the four benefits of CRM and give examples.","a":"1. Improved Efficiency — Automates repetitive tasks, streamlines workflows.\n   Example: Automated lead routing saves hours daily.\n\n2. Customer Focus — All departments aligned around customer needs.\n   Example: Support, sales, and marketing all see the same customer history.\n\n3. Data Accessibility — Centralized data accessible across the organization.\n   Example: Anyone can see when a customer last contacted the company.\n\n4. Enhanced Accountability — Tracks performance and holds teams responsible.\n   Example: Sales managers review pipeline activity per rep."},{"q":"Q10: Explain the five methods CRM uses to support a customer-centric culture.","a":"1. Implement a relationship business model with shared rewards and risk management.\n   PA EXAMPLE: This is THE answer for \"How does CRM support a customer-centric culture?\" — implementing a relationship model with risk management and shared rewards.\n\n2. Redesign the sales position to provide personal consultation and solutions toward customer needs/wants.\n\n3. Streamline, formalize, and re-engineer customer analysis processes.\n\n4. Commit to customer satisfaction and loyalty by investing in continuous refinement and improvement.\n\n5. Inform and educate customers about the benefit of building a business relationship, using all aspects of the value chain."},{"q":"Q11: Describe the three phases of customer touchpoints (before, during, after purchase) with examples.","a":"BEFORE Purchase:\nSocial media, ratings/reviews, testimonials, word of mouth, community involvement, advertising, marketing/PR.\n\nDURING Purchase:\nStore or office, website, catalog, promotions, staff/sales team, phone system, point of sale.\n\nAFTER Purchase:\nBilling, transactional emails, marketing emails, service support, online help center, follow-ups, thank-you cards.\n\nEach touchpoint can be tracked in a CRM to inform service and reveal post-purchase sentiment.\nPA EXAMPLE: A company that wants to map customer experience at specific interactions uses CRM to REVEAL INSIGHTS INTO TOUCHPOINTS AND POST-PURCHASE SENTIMENT."},{"q":"Q12: Describe at least four of the five primary customer touchpoints managed through a CRM system.","a":"Five Primary CRM Touchpoints:\n1. Call Centers — Inbound/outbound service and sales calls.\n2. Social Media — Twitter/X, Facebook, LinkedIn, Instagram engagement.\n3. Email Messaging — Marketing emails, transactional emails, support replies.\n4. Third-Party Websites — Review sites, partner portals, marketplaces.\n5. Chat Rooms and Forums — Live chat, communities, user forums."},{"q":"Q13: What are KPIs and how are they related to CRM systems?","a":"Key Performance Indicators (KPIs) — Type of performance measurement evaluating success of an organization or activity.\n\nRelation to CRM: CRM systems track and report KPIs in real time so managers can assess performance and make decisions.\n\nCommon CRM-tracked KPIs:\n• Sales Growth, Sales Target attainment, Sales Opportunities, Sales to Date\n• Product Performance, Lead Response Time, Lead Conversion Rate\n• Sell-through Rate, Cannibalization Rate, Quote-to-Close Rate\n• Average Purchase Value, Customer Acquisition Cost, Average Profit Margin\n\nPA EXAMPLE: A company should USE CRM TO ASSESS INTERACTIONS USING KPIs to provide quality customer service."},{"q":"Q14: How did increases in technology impact CRM use in marketing activities?","a":"Technology evolution drove CRM impact:\n• Early CRM = manual contact tracking, limited to sales reps.\n• Database technology enabled storage of large customer data sets.\n• Internet/web allowed real-time data capture from websites.\n• Big Data and analytics enabled segmentation and prediction.\n• Mobile and cloud made CRM accessible everywhere.\n• AI/ML enabled predictive lead scoring, personalization, automation.\n\nResult: Marketing shifted from broadcast/mass to one-to-one, personalized, data-driven engagement."},{"q":"Q15: How does CRM and big data relate to the evolution of Relationship Marketing?","a":"Relationship Marketing recognizes the long-term value of customer relationships and extends communication beyond intrusive promotional messages.\n\nCRM + Big Data enables:\n• 360-degree customer view across channels\n• Personalized one-to-one marketing (unique mix per customer)\n• Database marketing (targeted messages from customer database)\n• Real-time engagement based on behavior\n\nThis evolution moved marketing from MASS (one message to many) to TARGETED (personalized to segments) to ONE-TO-ONE (personalized to individuals)."},{"q":"Q16: What are the five main types of target market segmentation?","a":"1. Geographic — Country, state, zip code.\n2. Demographic — Age, gender, race, ethnicity, education, income.\n3. Cultural — Country of origin, language, religion, dietary preferences, family structure, social roles.\n4. Psychographic — Values, opinions, attitudes, lifestyle.\n5. Behavioral — How they use products, what benefits they want, how they shop or pay, loyalty status.\n\nWhy segmentation matters in CRM:\nPA EXAMPLE: Segmentation IDENTIFIES DATA TO USE IN CUSTOMIZING BUYER MESSAGING — that's why it's critical to CRM.\n\nUndifferentiated Marketing example: A firm advertises a product on TV during a popular program watched by the majority of the population (one message to all)."}]},{"title":"Module 5: Sales Analytics","cards":[{"q":"Q1: How do sales analytics using CRM data contribute to sales practices, strategies, and management decision-making?","a":"Sales analytics using CRM data:\n• Compute success of recent sales activities and forecast future ones\n• Identify trends and likely outcomes\n• Refine and develop strategies for short- and long-term sales performance\n• Increase accuracy of lead generation\n• Automate presales processes\n• Enable evidence-based decisions on resource allocation, pricing, targeting, and product mix\n• Validate (or disprove) the company's value proposition through actual customer outcomes"},{"q":"Q2: Define sales analytics and discuss the two significant roles it plays for a sales team.","a":"Sales Analytics — The process of generating insights from sales data to identify, model, understand, and predict sales trends and forecasts from large data sets.\n\nTwo Roles:\n1. Internal Perspective — Used for SEGMENTATION; analyze and prioritize the customer base/prospects to target efficiently.\n   Segmentation — Dividing potential customers into groups based on different characteristics.\n\n2. External Perspective — VALIDATE the company's value assertion to the customer. Data can prove/disprove whether what sales is offering is actually delivering value."},{"q":"Q3: Describe the four steps in the sales analytics process or workflow.","a":"1. Collection — Determine the business objective; collect data using prescribed methods (surveys, forms, databases). Emphasize factual and accurate data.\n   PA EXAMPLE: A company analyst seeking input from the sales department on a business objective to develop a SURVEY INSTRUMENT = COLLECTION step.\n\n2. Processing — Sort and organize unstructured data to remove irrelevant info. Done in spreadsheets/data models.\n\n3. Analysis — Organize data into charts/graphs to facilitate visualization and analysis.\n\n4. Interpretation — Interpret results to guide business decisions, identify next steps, or inform best courses of action."},{"q":"Q4: Describe the four levels of sales data analytics and how each supports decision making.","a":"1. DESCRIPTIVE — \"What happened?\" Summarizes historical data. Bottom of the big-data value chain.\n   Example: Reviewing # of website visits over past months.\n\n2. DIAGNOSTIC — \"Why did something happen?\" Compares historical data to find dependencies/patterns.\n\n3. PREDICTIVE — \"What will happen?\" Uses past patterns to predict the future. Useful with high uncertainty. Used for lead scoring.\n\n4. PRESCRIPTIVE — \"How can we make it happen?\" / \"What's the best way to achieve an outcome?\" Most valuable level. Frames data from collection to interpretation with laser-focused questions.\n\nPast data (descriptive/diagnostic) supports learning; future data (predictive/prescriptive) supports optimization."},{"q":"Q5: Describe the steps in the workflow for prescriptive analytics.","a":"Prescriptive Analytics Workflow:\n1. Acquire and Process Data\n2. Form Hypotheses (after running data through analytical software)\n3. Take Initial Actions while hypotheses are being tested\n4. Prove or Disprove Hypotheses; prescribed actions are driven by the results.\n\nResult: A specific recommended action based on the data and tested assumptions."},{"q":"Q6: List and describe the three Vs of Big Data. Difference between structured and unstructured data?","a":"3 Vs of Big Data:\n1. VOLUME — Amount of data available. Sets too large for one info-processing system. Drove \"distributed computing\" — components of a software system shared across multiple computers.\n2. VELOCITY — Speed at which data is sent and collected.\n3. VARIETY — Various data forms (structured AND unstructured).\n\nStructured Data — Data in a fixed field within a record/file. Includes relational databases and spreadsheets.\n\nUnstructured Data — No predefined model or organization. Typically text-heavy but may contain dates, numbers, facts.\nExamples: Multimedia (images, video, audio), biometrics (fingerprints, facial recognition), graph data (connections between people).\nPA EXAMPLE: Marketing data containing multimedia and unstructured data represents the VARIETY characteristic of big data."},{"q":"Q7: What is the Internet of Things (IoT) and how does it relate to big data and analytics?","a":"Internet of Things (IoT) — Everything that is connected to the internet. A system of devices, appliances, and machines interconnected through the internet that can identify themselves to other devices and networks.\n\nRelation to Big Data/Analytics:\n• IoT devices generate massive volumes of real-time data (volume + velocity).\n• Data is often unstructured (variety).\n• Analytics turns IoT data streams into insights (e.g., predictive maintenance, customer behavior tracking, smart inventory).\n\nOpen-Source Frameworks (e.g., Hadoop) are used to handle the scale.\nPA EXAMPLE: Open-source frameworks let companies ADAPT CODING BASED ON NEEDS."},{"q":"Q8: Describe at least three ways Big Data can help organizations address business activities.","a":"1. Better Targeting & Segmentation — Identify the most valuable customer segments and personalize marketing.\n2. Improved Forecasting — Predict demand, churn, and pipeline outcomes more accurately.\n3. Operational Optimization — Reduce waste, optimize logistics/supply chain, improve customer service responsiveness.\n\nOther ways: Real-time decision making, fraud detection, product innovation based on usage data, dynamic pricing, churn prevention."},{"q":"Q9: How can organizations use CRM data and analytics to segment and target specific profiles? Define ICP.","a":"Process:\n• Use CRM data to cluster customers by shared attributes.\n• Apply analytics to find which clusters are most profitable / most likely to convert.\n• Build messaging and offers specific to each segment.\n\nIdeal Customer Profile (ICP) — Developed via effective segmentation. A categorical description of a customer that would benefit immensely from a company's offerings AND provides significant value in exchange.\n\nICP guides:\n• Lead scoring (which leads match the ICP)\n• Sales prioritization\n• Marketing spend\n• Product development direction"},{"q":"Q10: What is the 360-degree view of the customer? Describe the two types of data used.","a":"360-Degree Customer View — Process of collecting aggregated data from various touchpoints for complete understanding of the customer and to guide interactions.\n\nValue: Shortens buying process, improves sales interactions, deepens relationships, enables proactive personalized service → repeat sales.\n\nInternal Data Sources: Ordering info, service calls, sales call history.\nExternal Data Sources: Social media, website usage.\n\nTwo Captured Data Categories:\n1. FIT DATA — Attributes about the customer.\n   • Demographic (B2C): Age, income, etc.\n   • Firmographic (B2B): Industry type, revenue, # employees.\n\n2. BEHAVIORAL DATA — What the customer DID with the company.\n   (See Q11 for breakdown.)"},{"q":"Q11: What are the main types of behavioral data, and how is each defined?","a":"Behavioral Data captures what the consumer has done with the company. Three types:\n\n1. Intent — What the customer is doing externally: web searches, liking posts on social media. Signals interest.\n\n2. Engagement — Interactions with the company: website visits, email opt-ins. Signals active consideration.\n\n3. Relationship — Actual interactions with the sales force or anyone in the company: meetings, service calls, other interactions. Signals depth of the relationship."},{"q":"Q12: Explain how sales data analysis informs sales practices in: Lead Generation, Lead Scoring, CLV, Forecasting/Planning.","a":"1. Lead Generation — Analytics identify channels and content that produce highest-quality leads. Reduces wasted spend on cold or low-fit prospects.\n\n2. Lead Scoring — Numerical calculation ranking prospects by perceived value to the org.\n   Steps to develop:\n   (1) Determine customer characteristics\n   (2) Define characteristics of an ideal customer\n   (3) Develop a point system\n   (4) Score leads based on the point system\n\n3. Customer Lifetime Value (CLV) — Predicts future net profit from a customer. Drives retention investments and resource allocation.\n   CLV = Purchase Value × Gross Profit % × Number of Purchases\n\n4. Forecasting and Planning — Historical + pipeline data inform sales forecasts, hiring, capacity, inventory, and territory planning."},{"q":"Q13: What are internal and external factors that influence sales forecasts?","a":"Internal Factors:\n• Personnel changes (gaining/losing reps)\n• Product changes (launches, redesigns)\n• Pricing decisions\n• Marketing campaigns\n• Sales strategy shifts\n\nExternal Factors:\n• Economic conditions (recession, inflation)\n• Competitor changes (new entrants, price wars)\n• Regulatory environment (new laws)\n• Industry trends and technology shifts\n• Seasonal/cultural events\n\nPA EXAMPLE: A company redesigning offerings based on focus group feedback must consider the PRODUCT FACTOR when forecasting. Economic conditions are an external factor."},{"q":"Q14: What are predictive sales analytics? Describe the four tools they supply to sales managers.","a":"Predictive Sales Analytics — Use historical sales data + current pipeline to forecast future outcomes and recognize trends.\n\nFour Tools:\n1. Predictive Lead Scoring — Recognizes trends in the customer journey to predict where customers are in the pipeline.\n\n2. Predictive Forecasting — Based on historical performance and current pipeline, depicts likely outcomes per salesperson.\n   PA EXAMPLE: A sales manager monitoring historical trends of why customers are discontinuing purchases is using PREDICTIVE FORECASTING (related to attrition).\n\n3. Predict Customer Attrition — Raises awareness about customer churn based on satisfaction, usage, and historical trends.\n   PA EXAMPLE: A primary use of predictive analytics is CUSTOMER ATTRITION PREDICTION.\n\n4. Sales Performance Monitoring — Helps managers customize their coaching strategy with the team."},{"q":"Q15: Explain how sales analytics influences decision-making in: Predictive Sales, Salesperson Performance, Conversion/Win-Loss/Activity Goals, KPIs.","a":"1. Predictive Sales — Forecasts pipeline outcomes, attrition risk, and demand to guide proactive decisions.\n\n2. Salesperson/Sales Team Performance — Tracks pipeline activity, conversion at each stage, deal velocity → informs coaching and resource allocation.\n\n3. Conversion Ratios, Win–Loss Analysis, Activity Goals\n   • Conversion Ratio: How well a salesperson moves customers from one funnel stage to the next.\n   • Win-Loss Analysis: \"After-battle\" review of how well a salesperson performed given the opportunities faced.\n   • Activity Goals: # of calls/demos/emails per period.\n\n4. KPIs — Sales growth, conversion rate, lead response time, ACV, CAC, profit margin → drive strategy at every level.\n\nClose Rate = (Deals closed / Opportunities) × 100\nWin Rate = (Actual revenue / Revenue estimate) × 100"},{"q":"Q16: Explain the concept of conversion ratios. What does 20:1 mean?","a":"Conversion Ratio — Measures how good a salesperson is at moving customers from one stage of the sales funnel to the next.\n\n20:1 Conversion Ratio — It took 20 leads (or attempts) to get 1 conversion to the next stage.\n• Example: Out of 20 prospects contacted, only 1 agreed to a meeting.\n• Lower the first number (relative to 1), the more efficient the salesperson."},{"q":"Q17: List and describe the sales data most used as KPIs.","a":"Most-used Sales KPIs:\n• Sales Growth — Change in sales over a period.\n• Sales Target — Extent of goal attainment.\n• Sales Opportunities — Underperforming accounts with growth potential and look-alike non-customers.\n• Sales to Date — Current sales vs. same time last year.\n• Product Performance — Sales by product or product line.\n• Lead Response Time — Time to respond to a qualified lead.\n• Lead Conversion Rate / New Accounts Opened — % of leads converted, by rep/tactic/product/segment.\n• Sell-through Rate — Sales as a % of total inventory.\n• Cannibalization Rate — Sales gain of one product vs. sales loss of a substitute.\n• Quote-to-Close Rate — Average time to close.\n• Average Purchase Value — Average $ of purchases.\n• Customer Acquisition Cost (CAC) — Average cost to convert a lead.\n• Average Profit Margin — Profit by category/rep/team/product/customer type."}]},{"title":"Module 6: Sales Roles","cards":[{"q":"Q1: What are the four key factors that impact or drive job performance?","a":"Four key drivers of salesperson performance (along with personal/organizational/environmental variables):\n\n1. Role Perceptions — Beliefs about one's job and job expectations.\n2. Aptitude — Job aptitude; ability to perform a particular role.\n3. Skill Level — Special ability acquired through training.\n4. Motivation Level — General desire/willingness to do the job.\n\nAll four must be addressed for a salesperson to perform at their best."},{"q":"Q2: How are role perceptions and sales force structure intertwined? Provide three examples.","a":"Salespeople develop role perceptions based on the expectations of their internal stakeholders (managers, teammates, marketing) and external stakeholders (customers, vendors, community). The org structure shapes these expectations.\n\nExamples:\n1. Functional Structure — A salesperson reports to one sales manager with clear product responsibilities → role expectations are clear.\n\n2. Matrix Structure — Salesperson reports to TWO managers (e.g., product line + region) → role conflict more likely because of multiple/competing demands.\n   PA EXAMPLE: A matrix structure CAUSES CONFLICT IN A SALESPERSON'S PERFORMANCE DUE TO HAVING MULTIPLE BOSSES.\n\n3. Decentralized Structure — More autonomy and less ambiguity for experienced reps but can cause role inaccuracy if expectations aren't communicated."},{"q":"Q3: Identify three steps by which perceptions influence salesperson behavior?","a":"1. Role Partners (Stakeholders) Communicate Their Expectations — Internal and external stakeholders signal what they expect.\n\n2. The Salesperson Develops Perceptions — Filters expectations through experience, personality, and judgment.\n\n3. Perceptions Drive Salesperson Behavior — Behavior follows perception. Misperceptions → wrong actions; clear/accurate perceptions → effective behavior."},{"q":"Q4: Describe the top five personal traits of salespeople.","a":"1. Assertiveness — Pursuing a desired outcome or standing by an opinion while respecting others' results and views.\n\n2. Self-Awareness — Conscious knowledge of one's own character, feelings, motives, and desires.\n\n3. Empathy — Ability to understand and share the feelings of another.\n   PA EXAMPLE: Empathy contributes to a good customer relationship by CREATING AN EMOTIONAL CONNECTION WITH CLIENTS TO SHOW UNDERSTANDING THAT IS BUILT ON TRUST.\n\n4. Problem-Solving — Process of finding solutions to difficult or complex issues.\n\n5. Optimism — Mental attitude reflecting belief that outcomes will generally be positive."},{"q":"Q5: Define role ambiguity, role conflict, role inaccuracy, and role stress with examples.","a":"Role Ambiguity — Unclear or uncertain about role expectations.\nExample: A new rep doesn't know whether marketing or sales owns lead qualification.\n\nRole Conflict — Incompatible demands placed on a person.\nExample: Manager pushes for new logos; key customer demands more attention.\n\nRole Inaccuracy — Mistaken perception of role expectations.\nExample: Rep thinks the goal is # of demos when it's actually $ revenue.\n\nRole Stress — Pressures from one's job/role in the organization.\nExample: Constant pressure to hit quota while juggling admin tasks."},{"q":"Q6: List the internal and external stakeholders who act as role partners for the salesperson.","a":"Internal Stakeholders:\n• Sales Managers\n• Team Members\n• Marketing Staff\n• Company Executives\n\nExternal Stakeholders:\n• Family Members\n• Customers\n• Vendors\n• Community\n\nEach shapes role expectations for the salesperson."},{"q":"Q7: Describe the stress-related negative outcomes of role ambiguity.","a":"Stress-Related Effects of Role Ambiguity:\n• Psychological strain and dissatisfaction\n• Underutilization of human resources (talent wasted)\n• Feelings of futility on how to cope with the organizational environment\n\nResult: Lower productivity, higher turnover, lower job satisfaction."},{"q":"Q8: How does role conflict affect the emotional experience of the salesperson?","a":"Negative Effects of Role Conflict:\n• Intensified internal conflicts\n• Increased job-related tension\n• Job dissatisfaction\n• Reduced confidence in the organization and superiors\n\nThe salesperson feels pulled in multiple directions, which erodes trust in leadership and motivation."},{"q":"Q9: Contrast affective and cognitive job satisfaction.","a":"Affective Job Satisfaction — INTRINSIC factors. A person's emotional feeling about the job AS A WHOLE. Passion, fulfillment, sense of purpose.\n\nCognitive Job Satisfaction — EXTRINSIC factors. How satisfied employees feel about SPECIFIC ASPECTS of the job (pay, hours, benefits, working conditions). Logical/evaluative.\n\nHealthy sales culture supports both — passion for the work AND fair pay/conditions."},{"q":"Q10: Describe the steps managers take when developing a sales force structure.","a":"1. Define organizational goals and sales strategy.\n2. Determine the customer types and territories to be served.\n3. Select the type of departmentalization (function, product, customer, geography).\n4. Decide on centralization vs decentralization.\n5. Allocate sales force size (Breakdown / Workload / Incremental method).\n6. Assign roles, responsibilities, and reporting lines.\n7. Communicate clearly to reduce ambiguity and conflict.\n8. Monitor performance and adjust over time."},{"q":"Q11: Describe the four departmental structures used to structure a sales organization.","a":"1. FUNCTIONAL — Groups by expertise (HR, Finance, Sales/Marketing, R&D, Operations). Common as the company grows.\n\n2. PRODUCT — Based on the goods/services produced or sold by the unit. Salespeople aligned to product lines.\n\n3. CUSTOMER — Based on primary type of customer (key accounts, wholesale, retail).\n\n4. GEOGRAPHY — Based on geographic segmentation of organizational units (regions, countries, territories)."},{"q":"Q12: What is a matrix structure and what are the advantages and disadvantages?","a":"Matrix Structure — Combines people from different functional areas; the project management approach. Combines two forms of departmentalization (typically functional + product).\n\nAdvantages:\n• Skills are pooled together\n• Teams can be disbanded quickly\n• Better cross-functional collaboration\n• Flexible resource allocation\n\nDisadvantages:\n• EMPLOYEES HAVE TWO DIRECT SUPERVISORS — can cause confusion and role conflict\n• Decision-making can slow with dual approvals\n• Coordination overhead\n\nPA EXAMPLE: Matrix is the structure that causes conflict in salesperson performance due to having multiple bosses."},{"q":"Q13: What is decentralization and what are the benefits and risks?","a":"Decentralization — Decision-making responsibility is delegated by top management to middle and lower-level managers.\n\nBenefits:\n• Faster local decisions\n• Higher employee morale and autonomy\n• Better response to local market conditions\n• Develops future leaders\n\nRisks:\n• Inconsistent strategy across units\n• Harder to coordinate\n• Possible duplication of effort\n• Quality/control variability\n\nCentralization (opposite) = control under a single authority. PA EXAMPLE: A firm where decision-making authority resides with executive leadership operates with a CENTRALIZED structure."},{"q":"Q14: Explain the four primary factors that shape a customer's experience, involvement, and satisfaction.","a":"1. PERSONAL — Individual factors: gender, age, income/social class, ethnicity, sexual orientation, lifestyle, religion, culture. Substantially influence perceptions.\n   PA NOTE: A consumer drawn to a product because of THEIR LIFESTYLE/needs = PERSONAL factor.\n\n2. OBJECT — Degree of information the consumer has about the product, including how well they can distinguish its characteristics.\n   PA EXAMPLE: A solar-panel company white paper helps a consumer understand pros/cons → influencing the OBJECT factor of product perception.\n\n3. SITUATIONAL — Products that conform to or enrich a consumer's lifestyle are consumed with more frequency/involvement.\n\n4. SOCIAL — Recommendations from social network (family, friends, communities, social media) deeply affect behavior."},{"q":"Q15: Discuss the dynamics between consumers and salespeople, emphasizing perception and influence strategies.","a":"Sales is a two-way perception process:\n• Salesperson perceives the customer's social style, needs, role, motivations.\n• Customer perceives the salesperson's competence, integrity, and value.\n• Both adapt; the goal is mutual benefit.\n\nInfluence strategies:\n• Adaptive Selling (style flexing) — Salesperson adjusts approach to the customer's style.\n• Law of Psychological Reciprocity — When you adapt to or do something nice for someone, they reciprocate.\n• Consultative/Trusted-Advisor approach — Build credibility, then influence is welcomed.\n\nPA EXAMPLE: A car salesperson balancing both the dealership/her own quota AND the consumer's safety needs successfully achieves the sale by RECOGNIZING THE NEED TO ACHIEVE BOTH THE SALESPERSON'S AND THE CONSUMER'S OBJECTIVES."},{"q":"Q16: Identify the differences between extended problem solving, limited problem-solving, and routinized response behavior.","a":"Extended Problem Solving — High involvement, important purchase, significant info gathering. Customer becomes well-educated about the product BEFORE buying. Salesperson focuses on relationship building, not quick sales.\n\nLimited Problem-Solving — Moderate involvement. Customer has some experience and uses limited info. The customer is SWAYED DIRECTLY BY ADVERTISING AND PROMOTION.\nPA EXAMPLE: A sale where a customer has a limited problem-solving mindset → THE CUSTOMER IS SWAYED DIRECTLY BY ADVERTISING AND PROMOTION.\n\nRoutinized Response Behavior — Low involvement, habitual purchase (e.g., buying a usual coffee brand). Little/no info search; brand loyalty drives the decision."}]},{"title":"Module 7: Recruitment Process","cards":[{"q":"Q1: Describe the steps in a job analysis.","a":"Job Analysis — Process of collecting information about the activities, tasks, and responsibilities of each job.\n\nSteps:\n1. Select jobs to study\n2. Determine needed information\n3. Identify data sources\n4. Determine data collection methods\n5. Evaluate and verify data\n6. Use data to write job analysis and description"},{"q":"Q2: What is the difference between Job Design and Job Analysis?","a":"Job Analysis — Process of COLLECTING information about activities, tasks, responsibilities of a job. (Describes what a job IS.)\n\nJob Design — How a job is being done; how a job can be MODIFIED or changed to be more effective. (Shapes what a job WILL BE.)\n\nJob Description — Written statement outlining job title, duties, tasks, and responsibilities (output of job analysis).\n\nJob Specification — Knowledge, Skills, and Abilities (KSAs) required to do the job (output of competency analysis)."},{"q":"Q3: Explain task-based vs competency-based analysis and how each impacts sales recruitment.","a":"Task-Based Analysis — Focuses on DUTIES of the sales role. Lists in detail the tasks performed.\nBest for: Standardized, transactional roles (e.g., receptionist, inside-sales order taker).\nRecruitment impact: Hire for ability to perform specific tasks.\n\nCompetency-Based Analysis (also called Job Specification) — Focuses on the specific knowledge and abilities a salesperson must have to perform the job.\nBest for: Strategic, complex roles (e.g., VP of Sales, Key Account Manager).\nRecruitment impact: Hire for KSAs (Knowledge, Skills, Abilities) and behaviors."},{"q":"Q4: Identify essential guidelines for creating an effective job description.","a":"Effective job description guidelines:\n• Use a clear, accurate job title\n• Provide a brief summary of the role\n• List essential duties and responsibilities (action-oriented)\n• Specify required qualifications (education, experience, skills)\n• Identify reporting relationships\n• Note physical requirements and working conditions\n• Avoid discriminatory language\n• Include salary range and benefits where appropriate\n• Reflect the actual job, not aspirational language"},{"q":"Q5: Identify and briefly describe the employment antidiscrimination statutes.","a":"1. Title VII of the 1964 Civil Rights Act — Prohibits employment discrimination based on race, color, religion, sex, or national origin (employers with 15+ employees).\n\n2. Lilly Ledbetter Fair Pay Act of 2009 — Lets victims file a complaint within 180 days of their last discriminatory paycheck.\n\n3. Equal Pay Act of 1963 — Eliminates wage gaps between women and men by prohibiting pay discrimination.\n   PA EXAMPLE: Hiring a female candidate at a LOWER exempt salary than other (male) salespeople = EQUAL PAY ACT OF 1963 violation.\n\n4. Age Discrimination in Employment Act of 1967 (ADEA) — Prohibits age discrimination against employees 40+.\n\n5. Pregnancy Discrimination Act of 1978 — Amended Title VII; illegal to discriminate based on pregnancy/childbirth/related conditions.\n\n6. Americans with Disabilities Act (ADA) of 1990 — Prohibits discrimination against qualified disabled workers.\n\n7. Occupational Safety and Health Act (OSHA) — Workplace safety/health standards.\n\n8. Fair Labor Standards Act (FLSA) — Sets minimum wage; Davis-Bacon Act requires prevailing wages for gov't contractors."},{"q":"Q6: Describe what the EEOC does. Difference between disparate treatment and disparate impact?","a":"EEOC (Equal Employment Opportunity Commission) — Federal agency that enforces antidiscrimination laws. Investigates complaints, files lawsuits, issues guidance to employers.\n\nDisparate Treatment — Treatment of an individual that is LESS FAVORABLE than others for discriminatory reasons (race, religion, sex, national origin, age, disability). INTENTIONAL discrimination.\nPA EXAMPLE: A hiring manager picks the older candidate due to \"perceived higher maturity\" and dissatisfaction with younger hires = DISPARATE TREATMENT (intentional age-based discrimination).\n\nDisparate Impact — Unintended discrimination against a protected group as a whole through use of a particular requirement (e.g., a strength test that disproportionately screens out women)."},{"q":"Q7: Briefly describe the seven sources for recruitment of salespeople.","a":"1. Internal Sources — Promote/transfer current employees.\n2. Employee Referrals — Existing employees refer candidates.\n3. Advertisements — Online job boards, newspapers, trade journals.\n4. Recruitment/Staffing Firms — Outside agencies sourcing candidates.\n5. Educational Institutions — Colleges, universities, trade schools.\n6. Professional Organizations — Industry associations, conferences, networking.\n7. Social Recruiting — LinkedIn, Twitter/X, Facebook, online business networks.\n   PA EXAMPLE: Posting a technical sales opening on popular online business networking platforms = SOCIAL RECRUITING."},{"q":"Q8: Describe the types of questions included on a job analysis questionnaire.","a":"Common questionnaire categories:\n• Job duties and tasks performed\n• Frequency and importance of each task\n• Tools, equipment, software used\n• Work environment and physical requirements\n• Knowledge, skills, abilities required\n• Education and experience\n• Supervision given/received (reporting relationships)\n• Decision-making authority\n• Performance standards/metrics\n• Interactions with customers/coworkers/vendors"},{"q":"Q9: Explain the concepts of creating a job description and job specifications.","a":"Job Description — Written statement outlining the job title, duties, tasks, and responsibilities.\nIncludes: title, summary, duties, reporting lines, working conditions.\n\nJob Specifications — Knowledge, Skills, and Abilities (KSAs) the job requires.\nIncludes: education, experience, certifications, technical skills, soft skills.\n\nTogether they tell candidates and managers what the job IS and what it TAKES to do it."},{"q":"Q10: Describe a recruitment plan and list the internal and external factors that affect a recruitment plan.","a":"Recruitment Plan — A documented strategy for finding and attracting qualified candidates: timeline, sources, budget, evaluation criteria, communication.\n\nInternal Factors:\n• Company budget for recruiting\n• Hiring policies and culture\n• Existing workforce skills\n• Promotion-from-within practices\n• Leadership pipeline\n\nExternal Factors:\n• Labor market conditions / unemployment rate\n• Competition for talent\n• Legal/regulatory requirements\n• Economic conditions\n• Industry trends and tech changes"},{"q":"Q11: Identify the six steps in the employee selection process.","a":"1. Initial Screening — Resume review (often via resume-parsing software). Saves time in the overall hiring process.\n   PA NOTE: Resume-parsing software SAVES TIME IN THE HIRING PROCESS.\n\n2. Application Form / Detailed Review\n\n3. Interviews — Phone, video, in-person, panel, etc.\n\n4. Testing — Personality, aptitude, ability, integrity tests.\n\n5. Background and Reference Checks\n\n6. Job Offer / Hiring Decision"},{"q":"Q12: Describe internal and external recruiting practices.","a":"Internal Recruiting:\n• Promotions, transfers, internal job postings\n• Pros: Lower cost, faster ramp, known performers, motivates employees.\n• Cons: Limited talent pool, can create internal rivalries, leaves a different vacancy to fill.\n\nExternal Recruiting:\n• Job boards, ads, social recruiting, staffing firms, college recruiting, employee referrals, headhunting.\n• Pros: Fresh ideas, broader talent, fills skill gaps.\n• Cons: Higher cost, longer ramp, cultural-fit risk."},{"q":"Q13: What is a staffing firm and what are their typical sources of candidates?","a":"Staffing Firm — Outside agency that sources and screens candidates for client companies, often for temporary, contract, or permanent placements.\n\nTypical sources:\n• Their own candidate database (talent pool)\n• Job boards and aggregators\n• LinkedIn and social platforms\n• Referrals\n• Industry events and conferences\n• Cold outreach to passive candidates"},{"q":"Q14: Describe the typical non-recruiting firm sources of external job candidates.","a":"Non-recruiting-firm external sources:\n• Online job boards (Indeed, Monster, etc.)\n• LinkedIn and social media\n• Company career site\n• Employee referrals\n• College and trade-school placement offices\n• Industry associations and trade journals\n• Networking events and conferences\n• Walk-ins/applications"},{"q":"Q15: What are the benefits of promoting employee referrals?","a":"• Higher quality candidates (employees screen socially)\n• Faster hiring and lower cost\n• Better cultural fit\n• Higher retention rates\n• Improved morale of referring employees (especially with referral bonuses)\n• Smaller risk of bad hires"},{"q":"Q16: What is social recruiting and what are the goals?","a":"Social Recruiting — Using social media platforms (LinkedIn, Twitter/X, Facebook, Instagram) to find and attract candidates.\n\nGoals:\n• Reach passive candidates not actively looking\n• Showcase employer brand and culture\n• Engage candidates where they spend time\n• Reduce reliance on costly job boards\n• Speed up sourcing\n• Tap into networks of current employees\n\nPA EXAMPLE: Posting a tech sales role on online business networking platforms = SOCIAL RECRUITING."},{"q":"Q17: Describe the six steps or hurdles in the selection process.","a":"1. Application/Screening — Initial review of resumes (often parsed by software).\n2. Interview(s) — Structured/unstructured conversations to assess fit.\n3. Testing — Personality, aptitude, ability, integrity assessments.\n4. Background Check — Criminal, employment, education verification.\n5. Reference Check — Speaking with prior managers/coworkers.\n6. Job Offer — Final decision and offer extended.\n\nEach step \"filters out\" candidates who don't meet the bar."},{"q":"Q18: Describe disparate impact and disparate treatment in candidate selection.","a":"Disparate Treatment — INTENTIONAL discrimination against an individual due to a protected characteristic.\nExample: Refusing to hire someone because of their age, race, religion, or sex.\n\nDisparate Impact — UNINTENDED discrimination where a neutral selection rule disproportionately excludes a protected group.\nExample: A height
