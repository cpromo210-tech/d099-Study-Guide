W (the opposite of leniency).\n• CENTRAL TENDENCY ERROR — rating everyone in the MIDDLE / \"average,\" avoiding extremes.\n• RECENCY ERROR — over-weighting the MOST RECENT events instead of the whole period (PA Q55: basing rating on the entire period AVOIDS recency error).\n• CONFIRMATORY BIAS — seeking info that confirms what you already believe.\n• SIMILARITY BIAS — favoring people who are LIKE you.\n• PERSONAL BIAS — prejudice for/against someone.\n\nGROUPTHINK (you flagged this — know it cold):\nGROUPTHINK = when a group's desire for HARMONY and agreement OVERRIDES realistic evaluation of alternatives. Dissent is suppressed, people self-censor, and the group makes a worse decision because no one challenges it. It's a DECISION-MAKING flaw, not strictly an appraisal error — but it shows up around evaluation/decision questions. Tell: \"everyone went along to keep the peace / avoid conflict, so they ignored better options\" = groupthink.\n\nQUICK MATCH DRILL:\n• \"One strength inflates the whole score\" → HALO.\n• \"Everyone rated average\" → CENTRAL TENDENCY.\n• \"Only judged on last two months\" → RECENCY.\n• \"Rated everyone too positively\" → LENIENCY.\n• \"Group suppressed dissent for harmony\" → GROUPTHINK."},{"q":"ELI5 — Return on Assets Managed (RAM / return on assets measurement)","a":"ELI5: Are you squeezing enough sales out of the stuff (assets) you're responsible for?\n\nFORMAL: Return on Assets Managed (RAM) measures how efficiently a salesperson/territory turns the ASSETS they manage (inventory, accounts receivable, etc.) into PROFIT.\n\nTHE KEY EXAM LOGIC (PA Q59):\nReturn on assets managed is driven by two levers:\n• PROFIT MARGIN (profit ÷ sales), and\n• ASSET TURNOVER (sales ÷ assets).\n\nIf you want to IMPROVE return on assets managed and the PROFIT MARGIN is held CONSTANT, you must raise the OTHER lever → INCREASE the ASSET TURNOVER RATE. (Sell more from the same asset base / move inventory faster.)\n\nEXAM TELL: \"improve return on assets managed, profit margin stays constant\" → INCREASE ASSET TURNOVER. (Not cut quotas, not transactional selling.)"},{"q":"ELI5 — Four Departmental Structures to Organize a Sales Force","a":"ELI5: Four ways to slice up your sales team.\n\nTHE 4 (by what you group around):\n1. PRODUCT STRUCTURE — organized by the GOODS/SERVICES sold. Best when the PRODUCT LINE itself needs deep specialization (e.g., a rep who only sells complex medical devices).\n2. CUSTOMER STRUCTURE — organized by TYPE OF CUSTOMER served; reps get specific customer types and customize service to each. TRAP ALERT: the official Unit 5 Test asks \"which structure is ideal when products/services require heavy specialization FOR CLIENTS?\" → the answer is CUSTOMER structure, NOT product. The phrase \"for clients\" means the specialization is built around the customer. (Module 6: Sparkit makes fixtures specifically for restaurants → customer structure.)\n3. GEOGRAPHY STRUCTURE — organized by TERRITORY/region.\n4. FUNCTIONAL STRUCTURE — organized by ROLE/expertise (prospecting team, closing team, etc.); single chain of command.\n\nPLUS THE MATRIX (the trap structure):\n• MATRIX STRUCTURE — combines TWO forms (usually functional + product). Salespeople get TWO bosses.\n  - DISADVANTAGE tested: \"employees have TWO direct supervisors\" → causes ROLE CONFLICT (PA Q29, Q30).\n\nCENTRALIZATION vs DECENTRALIZATION:\n• CENTRALIZED — authority concentrated at the top/executive leadership (PA Q31; Module 6: powerful CEO = HIGH centralization).\n• DECENTRALIZED — decisions pushed down to middle/lower managers.\n\nEXAM TELLS: \"tailored to a specific customer type\" = customer structure. \"Two bosses / conflict\" = matrix. \"Authority at the top\" = centralized."},{"q":"ELI5 — RACI Matrix (borderline, but know it)","a":"ELI5: For any task, who DOES it, who's in CHARGE, who gives ADVICE, and who just needs to be TOLD.\n\nRACI =\n• R — RESPONSIBLE: the person(s) who actually DO the work.\n• A — ACCOUNTABLE: the ONE owner who signs off / is answerable. GOLDEN RULE: exactly ONE \"A\" per task.\n• C — CONSULTED: people who give INPUT (two-way communication).\n• I — INFORMED: people kept UPDATED (one-way communication).\n\nUSE: clarifies roles on a project/task so nothing is dropped and no one steps on toes.\n\nNOTE: RACI is more of a C722 (Project Management) concept; it appears here only because it can surface as a role-clarity distractor. If your D099 quizzes never showed it, don't over-index — but now you know it cold.\n\nEXAM TELL: \"exactly one person accountable / signs off\" = the Accountable in RACI."},{"q":"ELI5 — Modular, Corporate, Functional Structures (corporate level)","a":"ELI5: How the WHOLE COMPANY is organized (zoom out from the sales team).\n\n• CORPORATE STRUCTURE — the overall framework of departments/business units a company uses to hit its mission and goals (the big picture of hierarchy and reporting).\n\n• FUNCTIONAL STRUCTURE — groups employees by SPECIALIZED ROLE/expertise (HR, Finance, Sales & Marketing, R&D, Operations under a CEO). Single chain of command. Adopted as a company grows.\n\n• MODULAR STRUCTURE — divides the business into small, tightly-knit STRATEGIC BUSINESS UNITS (SBUs), each focused on a specific element of the process. Think CEO → Division X and Division Y, each with its OWN Production, Sales/Marketing, Finance, R&D. Interdependence between units is limited.\n\n• STRATEGIC BUSINESS UNIT (SBU) — a semi-independent PROFIT CENTER focused on one product offering + market segment.\n\nEXAM TELLS: \"small tightly-knit SBUs / divisions each self-contained\" = MODULAR. \"Grouped by expertise/role under one chain\" = FUNCTIONAL. \"Overall department framework for the mission\" = CORPORATE."},{"q":"ELI5 — Recoverable vs Non-Recoverable Draw (don't confuse these)","a":"ELI5: A draw is an ALLOWANCE the company gives a salesperson up front, against commissions they'll earn later.\n\n• RECOVERABLE DRAW — the company EXPECTS to get it BACK. If the rep doesn't earn enough commission to cover the advance, they OWE the difference (it's a loan against future earnings).\n\n• NON-RECOVERABLE DRAW — the company does NOT expect it back. The rep KEEPS the money even if their commission falls short. Common for NEW HIRES who need a safety net while ramping up. (It differs from a salary because it's still framed against commission.)\n\nPA Q47 BREAKDOWN: New employees get $3,000/month for sales made, can earn MORE if they exceed 3 sales, and DON'T return money if they miss 3 sales → they KEEP it short → NON-RECOVERABLE DRAW.\n\nEXAM TELL: \"keeps it even if commission falls short / doesn't pay it back\" = NON-recoverable. \"Has to pay it back / advance against future commission\" = recoverable."},{"q":"ELI5 — Power Skills (a.k.a. soft skills)","a":"ELI5: People skills — the personal stuff that helps you get along with and persuade others. (Hard skills = teachable, measurable stuff like product knowledge.)\n\nFORMAL: Power Skills = personal attributes that enable someone to interact effectively and harmoniously with others (the modern name for \"soft skills\").\n\nTHE KEY POWER SKILLS:\n• EMPATHY — understand and share another's feelings (builds trust via emotional connection → PA Q4).\n• VERBAL COMMUNICATION — written + spoken language; includes RESPONSIVE LISTENING (listening to UNDERSTAND, repeating back the customer's need → PA Q5).\n• CONFLICT RESOLUTION — reduce sources of conflict; handle objections/complaints professionally.\n• ANALYTICAL DECISION-MAKING — make decisions using solid data/information.\n\nHARD SKILLS (the contrast): product knowledge, proposals/contracts, technology proficiency, software skills.\n\nEXAM TELLS: \"empathy/communication/conflict resolution\" = power (soft) skills. \"Product knowledge/software\" = hard skills. Module 2: William uses VERBAL COMMUNICATION (soft) + PRODUCT KNOWLEDGE (hard)."},{"q":"ELI5 — Recruitment & Selection (the part you said to study)","a":"ELI5: How a company FINDS candidates (recruitment) and then PICKS one (selection).\n\nRECRUITMENT = building a POOL of qualified candidates. Methods:\n• INTERNAL — promote from within.\n• EXTERNAL — look outside.\n• EMPLOYEE REFERRALS — current staff refer people; research says referrals are the BEST source for LOYAL, SATISFIED hires (Module 7 Q2).\n• SOCIAL RECRUITING — using SOCIAL MEDIA / online networking platforms to find candidates (Module 7 Q3; PA Q37: posting on business networking platforms = social recruiting).\n• HEADHUNTING / recruitment firms, college recruiting, nepotism.\n\nJOB ANALYSIS first → then JOB DESCRIPTION (duties) + JOB SPECIFICATION (the KSAs a person needs). Job analysis = collecting info about a job's tasks/responsibilities (Module 7: questionnaire about jobs = job analysis).\n\nSELECTION STEPS: initial screening → employment testing → selection interview → background/reference checks → physical/drug → decision to hire.\n\nTESTS:\n• COGNITIVE ABILITY TEST — reasoning + math (Module 7 Q5: reasoning/math questions = cognitive ability test).\n• APTITUDE — ability to LEARN new skills.\n• ACHIEVEMENT — CURRENT knowledge.\n\nDATA QUALITY:\n• VALIDITY — the test measures what it's SUPPOSED to.\n• RELIABILITY — it gives CONSISTENT results over time (PA Q42: same question consistently predicts success = reliability).\n\nETHICS: testing must be CONSISTENTLY applied to ALL candidates (PA Q41).\n\nDISCRIMINATION:\n• DISPARATE TREATMENT — INTENTIONAL discrimination against an individual (PA Q39: picking the older candidate on purpose).\n• DISPARATE IMPACT — UNINTENTIONAL discrimination from a neutral policy.\n• Key statutes: Equal Pay Act 1963 (pay gap by sex → PA Q35), ADEA 1967 (age 40+), Title VII, ADA, FLSA.\n\nEXAM TELLS: \"best for loyal hires\" = referrals. \"Social media/networking\" = social recruiting. \"Reasoning + math test\" = cognitive ability. \"Consistent results over time\" = reliability. \"On-purpose individual discrimination\" = disparate treatment."},{"q":"ELI5 — MODULE 5 RE-EXPLAINED: The 4 Levels of Analytics (what / why / will / how)","a":"You finished Module 5 — here's the cleaner version. The 4 analytics levels answer 4 questions, in order of difficulty:\n\n1. DESCRIPTIVE — \"WHAT HAPPENED?\"\n   Summarizes PAST data. Like reading last month's scoreboard. (Sales went down 10%.)\n\n2. DIAGNOSTIC — \"WHY DID IT HAPPEN?\"\n   Digs into causes and patterns. (Sales dropped because a competitor cut prices.)\n\n3. PREDICTIVE — \"WHAT WILL HAPPEN?\"\n   Uses PAST PATTERNS to FORECAST the future. (Module 5: Synesthor emailed customers who visited the site 6+ times because that pattern PREDICTS they'll upgrade → PREDICTIVE.) Also: predictive LEAD SCORING, predictive FORECASTING, predicting CUSTOMER ATTRITION/churn.\n\n4. PRESCRIPTIVE — \"HOW DO WE MAKE IT HAPPEN?\" / \"WHAT'S THE BEST ACTION?\"\n   Recommends the best course of action given resources and scenarios. (Run THIS campaign to hit the target.)\n\nMEMORY HOOK: Descriptive = what, Diagnostic = why, Predictive = will, Prescriptive = how.\n• Past-looking = descriptive + diagnostic.\n• Future-looking (big data analytics) = predictive + prescriptive.\n\nEXAM TELL: \"used past behavior/patterns to decide who WILL buy\" = PREDICTIVE. \"Recommends the best action to achieve a goal\" = PRESCRIPTIVE."},{"q":"ELI5 — MODULE 5 RE-EXPLAINED: Predictive Analytics in action + 3 V's of Big Data","a":"WHAT PREDICTIVE ANALYTICS DOES (4 sales uses to recognize):\n1. PREDICTIVE LEAD SCORING — spots where a customer is in the pipeline and ranks them.\n2. PREDICTIVE FORECASTING — uses historical performance + current pipeline to predict deal outcomes per rep.\n3. PREDICT CUSTOMER ATTRITION (CHURN) — flags customers likely to LEAVE, based on satisfaction, usage, and historical trends. (PA Q28: tracking historical trends of WHY customers discontinue = customer attrition prediction.)\n4. SALES PERFORMANCE MONITORING — helps managers tailor COACHING.\n\nTHE 3 V's OF BIG DATA (memorize):\n• VOLUME — the AMOUNT of data (tons of transactions/records).\n• VELOCITY — the SPEED data is sent/collected.\n• VARIETY — the different FORMS of data: structured + UNSTRUCTURED (text, images, multimedia). (PA Q22: multimedia + unstructured data = VARIETY.)\n\nBONUS BIG-DATA TERMS:\n• Structured data — fits neatly in fields (databases, spreadsheets).\n• Unstructured data — text-heavy, no fixed model (emails, social posts, video).\n• Distributed computing — sharing a software system's components across multiple computers.\n• Open-source — source code free to use/modify (PA Q24: \"adapt coding based on needs\" → open-source).\n\nEXAM TELLS: \"multimedia/unstructured\" = VARIETY. \"speed of data\" = velocity. \"amount of data\" = volume. \"tracking who'll churn\" = predict customer attrition."},{"q":"ELI5 — MODULE 5 RE-EXPLAINED: Forecasting methods (subjective vs objective) — DRILL THIS","a":"Forecasting splits into TWO families. Know which bucket each method is in — the OA loves to ask \"which QUANTITATIVE/QUALITATIVE method.\"\n\nQUALITATIVE / SUBJECTIVE (human judgment, no hard math — best when little data exists):\n• EXPERT OPINION — outside knowledgeable consultants give input (Module 12: Endothon hires consultants → expert opinion).\n• JURY OF EXECUTIVE OPINION — internal LEADERS pool their judgment.\n• SALES FORCE COMPOSITE — your own REPS estimate their territory sales (Expected Value = Forecasted Sales × Probability).\n• CUSTOMER OPINIONS / SURVEYS — ask buyers their intentions. Advantage: rich, DETAILED USER information. Disadvantage: expensive/time-consuming.\n• DELPHI TECHNIQUE — anonymous expert rounds until consensus. Disadvantage: TIME CONSUMING.\n\nQUANTITATIVE / OBJECTIVE (math on past data — best in a STABLE market):\nThis is the TIME SERIES family:\n• SIMPLE MOVING AVERAGE — average recent periods EQUALLY (Unit 7: 6 weeks ÷ 6 = simple moving average).\n• WEIGHTED MOVING AVERAGE — weight recent periods more.\n• EXPONENTIAL SMOOTHING — uses ALL data but weights the MOST RECENT heaviest (PA Q66: higher factor to recent sales, lower to old = exponential smoothing).\n• DECOMPOSITION ANALYSIS — breaks the series into TREND, CYCLES, SEASONALITY, and RANDOM NOISE; used to handle predictable SEASONAL SPIKES (Module 12: September/holiday spikes = decomposition; PA Q65: data split into 4 segments = time series).\n• ROLLOVER / NAÏVE — copy last period straight into the next.\n• MARKET TEST — release to a LIMITED region to gauge real response (good for NEW products).\n\nTHE BIG TRAPS:\n• \"Outside consultants\" = EXPERT OPINION (qualitative).\n• \"Anonymous rounds, downside is slow\" = DELPHI (qualitative).\n• \"Weights recent data heaviest, uses all data\" = EXPONENTIAL SMOOTHING (quantitative).\n• \"Handles seasonal spikes / splits into components\" = DECOMPOSITION (quantitative).\n• \"Equal average of recent periods\" = SIMPLE MOVING AVERAGE.\n• \"Wants QUANTITATIVE method\" → pick TIME SERIES (not Delphi, not expert/executive opinion).\n• \"Wants QUALITATIVE method\" → pick Delphi / expert / executive / sales force composite.\n\nREMEMBER THE ORDER: Forecast → THEN set quotas."},{"q":"FORECASTING DEEP-DIVE 1 — The full method map (memorize which bucket)","a":"Two families. The OA constantly asks \"which QUALITATIVE / QUANTITATIVE method.\" Sort every method into the right bucket FIRST, then pick.\n\nQUALITATIVE / SUBJECTIVE (judgment, opinions, non-statistical — best when data is limited/unavailable or for long-term planning):\n1. CUSTOMER OPINIONS / SURVEYS — ask buyers their intentions.\n   • Advantage: rich, DETAILED USER information.\n   • Disadvantage: expensive and time-consuming; buyers' stated intent ≠ actual behavior.\n2. SALES FORCE COMPOSITE — your OWN sales REPS estimate their territory sales; estimates are combined and averaged.\n   • Formula tie-in: Expected Value = Forecasted Sales × Probability.\n   • Tell: \"based on salespeople's / reps' estimates.\"\n3. JURY OF EXECUTIVE OPINION — a small group of internal high-level EXECUTIVES/managers estimate together.\n   • Fast and widely used. Downside: prone to GROUPTHINK (a dominant voice can sway the room).\n4. EXPERT OPINION — input from knowledgeable people OUTSIDE the company (industry experts/consultants).\n   • Low cost and fast. (Module 12: Endothon hires outside consultants → EXPERT OPINION.)\n5. DELPHI TECHNIQUE — ANONYMOUS, ITERATIVE rounds of expert questionnaires (~10–12 experts) until consensus; reduces bias and the dominating-voice problem.\n   • Ideal when there is LITTLE OR NO historical data and you need expert judgment (e.g., a brand-new product, or estimating future seasonal trends).\n   • Disadvantage tested: TIME CONSUMING.\n\nQUANTITATIVE / OBJECTIVE (numerical/statistical analysis of past data — best in a STABLE market with good data):\nThis is the TIME SERIES family (+ market test + regression):\n1. NAÏVE / ROLLOVER — copy last period's actual sales straight into the next period as the forecast. Simplest; works only when very stable.\n2. SIMPLE MOVING AVERAGE — average of recent periods, weighted EQUALLY (e.g., last 6 weeks ÷ 6).\n3. WEIGHTED MOVING AVERAGE — average of recent periods, but RECENT periods weighted MORE.\n4. EXPONENTIAL SMOOTHING — uses ALL the data but weights the MOST RECENT observation the HEAVIEST (smoothing factor 0–1; closer to 1 = more weight on recent).\n5. DECOMPOSITION ANALYSIS — splits a time series into TREND + CYCLES + SEASONALITY + RANDOM NOISE; used to handle predictable SEASONAL SPIKES.\n6. REGRESSION (linear) — relates sales to other variables (ad spend, price, economy).\n7. MARKET TEST — release to a LIMITED region to gauge real response; good for NEW products.\n\nONE-LINE BUCKET CHECK:\n• \"Wants a QUANTITATIVE/OBJECTIVE method\" → TIME SERIES (or one of its members). NEVER pick Delphi/expert/executive/composite.\n• \"Wants a QUALITATIVE/SUBJECTIVE method\" → Delphi / expert opinion / jury of executive opinion / sales force composite / customer survey."},{"q":"FORECASTING DEEP-DIVE 2 — Trap-by-trap method matching","a":"Match the exact wording in the question to the method. These are the traps the OA uses.\n\n• \"Convenes experts who submit ANONYMOUS estimates over several ROUNDS until they agree\" → DELPHI.\n• \"No historical data, need expert judgment for a brand-new product\" → DELPHI.\n• \"Disadvantage of Delphi\" → TIME CONSUMING. (NOT 'dominating voice' — anonymity prevents that. NOT 'introverts excluded' — anonymity protects them.)\n• \"Internal EXECUTIVES/managers estimate together quickly\" → JURY OF EXECUTIVE OPINION (watch for GROUPTHINK as its weakness).\n• \"Outside knowledgeable CONSULTANTS/industry experts give insight\" → EXPERT OPINION.\n• \"SALESPEOPLE/reps estimate their own territory sales\" → SALES FORCE COMPOSITE.\n• \"Survey/ask CUSTOMERS their buying intentions\" → CUSTOMER SURVEY. Advantage = detailed user info.\n• \"Uses ALL data but weights the MOST RECENT heaviest\" → EXPONENTIAL SMOOTHING. (PA: 'higher factor to recent sales, lower to old' = exponential smoothing.)\n• \"Averages recent periods EQUALLY\" → SIMPLE MOVING AVERAGE.\n• \"Weights recent periods more (but not 'all data')\" → WEIGHTED MOVING AVERAGE.\n• \"Copies last period straight into the next\" → NAÏVE / ROLLOVER.\n• \"Adjusts for predictable SEASONAL spikes / splits into trend-season-cycle-noise\" → DECOMPOSITION. (Module 12: Sept/holiday spikes = decomposition.)\n• \"Past sales trends, data split into segments to estimate a growth rate\" → TIME SERIES. (PA Q65.)\n• \"Wants QUANTITATIVE analysis (household goods / snack foods)\" → STATISTICAL REVIEW or TIME SERIES TECHNIQUE (whichever is the quantitative option offered; AVOID Delphi/expert/executive/composite). (PA Q67 = Statistical review; PA Q68 = Time series technique.)\n• \"Releases to a LIMITED market to test response before full launch\" → MARKET TEST.\n\nSEASONALITY VOCAB (decomposition components):\n• TREND — long-run up/down direction.\n• CYCLE — recurrent swing lasting ~2–5 years.\n• SEASONALITY — predictable, recurring within-year shifts (holidays, back-to-school).\n• RANDOM NOISE — unexplainable variation."},{"q":"FORECASTING DEEP-DIVE 3 — Market potential, quotas & the forecast→quota order","a":"POTENTIAL vs FORECAST (don't confuse):\n• MARKET POTENTIAL — the TOTAL industry-wide sales possible in a category for the period (the whole pie). (Module 12: total kitchenware sales across the entire industry = market potential.)\n• SALES POTENTIAL — the MAX share of that the company could realistically capture.\n• SALES FORECAST — what the company actually EXPECTS to sell (a realistic estimate, usually below sales potential).\n• MARKET FACTOR — an external factor that affects demand/price.\n• MARKET INDEX — a COMBINATION of market factors used to estimate likely sales.\n\nTHE ORDER (high-yield): FORECAST FIRST → THEN set QUOTAS. You estimate what's sellable, then translate it into individual targets. (PA: 'a sales forecast is developed BEFORE quotas are assigned.')\n\nQUOTA TYPES (know each):\n• VOLUME quota — units or dollars sold.\n• ACTIVITY quota — number of actions: calls, demos, NEW ACCOUNTS. (Module 12: 50 new accounts per rep = activity quota.)\n• PROFIT quota — based on gross margin / profitability.\n• COMBINATION quota — blends multiple factors (e.g., proceeds + sales capacity). (PA: multiple factors = combination.)\n• Cushioning method: OVERASSIGNING quotas (set totals above the forecast so shortfalls still hit the company goal).\n• OVERLAY quota — assigned to the MANAGERS who supervise reps (layered above individuals).\n\nSALES-FORCE SIZING METHODS:\n• INCREMENTAL — keep hiring while marginal revenue ≥ marginal cost; stop when MR = MC. (Module 12.)\n• WORKLOAD — total selling hours needed ÷ hours one rep can work.\n• BREAKDOWN — forecasted sales ÷ average sales per rep.\n\nINTERNAL vs EXTERNAL forces on a forecast:\n• INTERNAL — personnel, product changes, production capacity, marketing plans.\n• EXTERNAL — NEW LAWS/regulations (PA Q36), economy, competitors, technology/industry trends."},{"q":"FORECASTING DEEP-DIVE 4 — Predictive analytics is NOT the same as forecasting methods (don't mix them up)","a":"Two different question families that both sound like 'predicting the future' — keep them separate.\n\nA) FORECASTING METHODS (Module 11/12 + Unit 7) → the qualitative/quantitative techniques above (Delphi, time series, exponential smoothing, decomposition…). These answer \"WHICH METHOD do I use to estimate future sales?\"\n\nB) PREDICTIVE ANALYTICS (Module 5) → one of the 4 ANALYTICS LEVELS. Answers \"WHAT WILL HAPPEN?\" using past data patterns. Its sales uses:\n• PREDICTIVE LEAD SCORING — rank where a prospect is in the pipeline.\n• PREDICTIVE FORECASTING — project deal outcomes from pipeline + history.\n• PREDICT CUSTOMER ATTRITION (CHURN) — flag who's likely to cancel (satisfaction/usage/history). (PA: tracking historical trends of why customers leave = customer attrition.)\n• SALES PERFORMANCE MONITORING — tailor coaching.\n\nTHE 4 ANALYTICS LEVELS (re-lock this):\n• DESCRIPTIVE = \"what happened?\" (summary of the past)\n• DIAGNOSTIC = \"why did it happen?\" (causes/patterns)\n• PREDICTIVE = \"what WILL happen?\" (forecast from past patterns)\n• PRESCRIPTIVE = \"how do we MAKE it happen? / best action?\" (recommends a course of action)\n\nHOW TO TELL WHICH FAMILY A QUESTION IS:\n• If options are Delphi / time series / exponential smoothing / decomposition / expert opinion → it's a FORECASTING METHOD question.\n• If options are descriptive / diagnostic / predictive / prescriptive → it's an ANALYTICS LEVEL question.\n• If options are lead scoring / customer attrition / sales performance monitoring → it's a PREDICTIVE-ANALYTICS USE question.\n\nEXAM TELL recap: \"examines past behavior/patterns to decide who WILL buy\" = PREDICTIVE analytics. \"Which technique estimates next year's total sales\" = a FORECASTING method (pick by qualitative vs quantitative)."},{"q":"ELI5 — MODULE 5 RE-EXPLAINED: KPIs, ratios & metrics you must recognize","a":"ELI5: Different scoreboards that tell you how sales are doing.\n\nCONVERSION & FUNNEL:\n• CONVERSION RATIO — how well you move customers from one funnel stage to the next; buyers ÷ contacts (Module 5: 5 of 100 emails bought = conversion ratio).\n• CLOSE RATE — deals closed ÷ opportunities in the pipeline.\n• WIN RATE — actual revenue ÷ revenue estimate.\n• WIN-LOSS ANALYSIS — review of how a rep did given the opportunities faced (use it to judge if GOALS were met).\n\nGROWTH & VALUE:\n• SALES GROWTH — increase in units/revenue over time (Module 5: more v3.0 than v2.0 sales = sales growth).\n• AVERAGE PURCHASE VALUE — average $ per purchase.\n• CUSTOMER ACQUISITION COST — average cost to convert a lead to a paying customer.\n• AVERAGE PROFIT MARGIN — average profit across categories.\n\nRATIO CATEGORIES (PA Q52 trap):\n• EXPENSE ratios — cost-focused; \"cost of converting prospects to customers\" = EXPENSE ratio category.\n• ACCOUNT DEVELOPMENT ratios — growth of accounts.\n• CALL ACTIVITY ratios — effort/activity.\n\nACTIVITY vs OUTPUT:\n• ACTIVITY GOALS — number of calls/demos a rep must do (effort).\n• OUTPUTS — results (revenue, units).\n\nEXAM TELLS: \"5 of 100 bought\" = conversion ratio. \"cost to convert prospects\" = expense ratio. \"sales rising over time\" = sales growth. \"did we hit our goal?\" = win-loss analysis."}]}];

const content=document.getElementById('content');
const stat=document.getElementById('stat');

function render(filter){
  filter=(filter||'').trim().toLowerCase();
  let totalShown=0;
  content.innerHTML='';
  MODULES.forEach((mod,mi)=>{
    const isPower=/power|eli5|pass/i.test(mod.title);
    const matchCards=mod.cards.map((c,ci)=>({c,ci})).filter(({c})=>{
      if(!filter)return true;
      return (c.q+' '+c.a).toLowerCase().includes(filter);
    });
    if(matchCards.length===0)return;
    totalShown+=matchCards.length;
    const moduleEl=document.createElement('div');
    moduleEl.className='module'+((filter||mi===0)?' open':'');
    const head=document.createElement('div');
    head.className='mhead';
    head.innerHTML='<span class="mtitle'+(isPower?' power':'')+'">'+escapeHtml(mod.title)+'</span>'
      +'<span style="display:flex;align-items:center"><span class="mcount">'+matchCards.length+' card'+(matchCards.length>1?'s':'')+'</span><span class="mchev">›</span></span>';
    head.onclick=()=>moduleEl.classList.toggle('open');
    moduleEl.appendChild(head);
    const body=document.createElement('div');
    body.className='mbody';
    matchCards.forEach(({c})=>{
      const card=document.createElement('div');
      card.className='card'+(filter?' open':'');
      const q=document.createElement('div');
      q.className='cardq';
      q.innerHTML='<span class="qchev">›</span><span>'+highlight(c.q,filter)+'</span>';
      const a=document.createElement('div');
      a.className='carda';
      a.innerHTML=highlight(c.a,filter).replace(/\n/g,'<br>');
      q.onclick=()=>card.classList.toggle('open');
      card.appendChild(q);card.appendChild(a);
      body.appendChild(card);
    });
    moduleEl.appendChild(body);
    content.appendChild(moduleEl);
  });
  if(totalShown===0){content.innerHTML='<div class="nohits">No cards match \''+escapeHtml(filter)+'\'.</div>';}
  stat.textContent=filter?(totalShown+' cards match'):'';
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(s,f){
  let h=escapeHtml(s);
  if(f){const re=new RegExp('('+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');h=h.replace(re,'<mark>$1</mark>');}
  return h;
}
let searchTimer=null;
function doSearch(){if(searchTimer)clearTimeout(searchTimer);searchTimer=setTimeout(()=>render(document.getElementById('search').value),150);}
function expandAll(open){
  document.querySelectorAll('.module').forEach(m=>m.classList.toggle('open',open));
  if(open)document.querySelectorAll('.card').forEach(c=>c.classList.add('open'));
  else document.querySelectorAll('.card').forEach(c=>c.classList.remove('open'));
}
render('');
</script>
